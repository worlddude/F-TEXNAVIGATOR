<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Store Item Locator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e2ddd6;
    --text: #1a1814;
    --text-muted: #8a8070;
    --accent: #2d5a3d;
    --accent-light: #eaf2ec;
    --accent-hover: #234a31;
    --danger: #c0392b;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.05);
    --shadow-lg: 0 12px 32px rgba(0,0,0,.12), 0 4px 8px rgba(0,0,0,.06);
    --radius: 12px;
    --radius-sm: 8px;
    --header-height: 100px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 14px 0;
    flex-shrink: 0;
    box-shadow: var(--shadow-sm);
    z-index: 10;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .logo {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo svg { width: 18px; height: 18px; color: white; }

  .search-bar {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0 12px;
    gap: 8px;
    transition: border-color .2s, box-shadow .2s;
  }

  .search-bar:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(45,90,61,.1);
  }

  .search-bar svg { flex-shrink: 0; color: var(--text-muted); }

  .search-bar input {
    border: 0;
    outline: 0;
    background: transparent;
    flex: 1;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    height: 40px;
  }

  .search-bar input::placeholder { color: var(--text-muted); }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
  }

  .tabs button {
    flex: 1;
    background: none;
    border: 0;
    padding: 10px 8px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    position: relative;
    transition: color .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border-bottom: 2px solid transparent;
  }

  .tabs button::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
    transform: scaleX(0);
    transition: transform .2s;
  }

  .tabs button.active {
    color: var(--accent);
  }

  .tabs button.active::after {
    transform: scaleX(1);
  }

  .tabs button svg { width: 15px; height: 15px; }

  /* ── Main area ── */
  .main {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Map ── */
  #mapContainer {
    position: absolute;
    inset: 0;
    overflow: hidden;
    touch-action: none;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #map {
    will-change: transform;
    transform-origin: 0 0;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
    height: 100%;
    width: auto;
    object-fit: contain;
  }

  /* ── Camera ── */
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  #video.fullscreen {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 10;
    object-fit: cover;
  }

  /* ── Torch ── */
  #torchBtn {
    position: fixed;
    bottom: 180px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(8px);
    color: #fff;
    border: 1px solid rgba(255,255,255,.2);
    padding: 12px 16px;
    border-radius: 50px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    display: none;
    cursor: pointer;
    gap: 6px;
    align-items: center;
    box-shadow: var(--shadow-md);
    transition: background .2s;
  }

  #torchBtn.on { background: rgba(255,220,50,.9); color: #1a1814; }

  /* ── Item Card ── */
  .item-card {
    position: relative;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px;
    flex-shrink: 0;
    box-shadow: 0 -4px 16px rgba(0,0,0,.06);
    z-index: 5;
  }

  .item-card.hidden { display: none; }

  .item-card-inner {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  #itemPhotoDisplay {
    width: 68px;
    height: 68px;
    object-fit: cover;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    flex-shrink: 0;
    cursor: zoom-in;
  }

  .item-info { flex: 1; min-width: 0; }

  .item-info h2 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-info .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .meta-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }

  .meta-chip span { color: var(--text); font-weight: 500; }

  /* ── Add/Edit Form ── */
  #addForm {
    display: none;
    flex-direction: column;
    gap: 10px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
  }

  .form-row {
    display: flex;
    gap: 8px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .form-group label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--text-muted);
  }

  .form-group input {
    padding: 9px 12px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }

  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(45,90,61,.1);
  }

  .form-group input[readonly] {
    background: var(--surface2);
    color: var(--text-muted);
    cursor: default;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }

  .photo-row {
    display: flex;
    gap: 12px;
    align-items: center;
    background: var(--surface2);
    border: 1.5px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 10px;
  }

  #photoPreview {
    width: 56px;
    height: 56px;
    object-fit: cover;
    border-radius: 6px;
    background: var(--border);
    display: none;
    flex-shrink: 0;
  }

  .photo-upload-label {
    font-size: 13px;
    color: var(--text-muted);
    flex: 1;
  }

  .photo-upload-label strong { color: var(--accent); cursor: pointer; }

  input[type="file"] {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
  }

  .btn-save {
    padding: 11px 16px;
    border: 0;
    border-radius: var(--radius-sm);
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, transform .1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-save:hover { background: var(--accent-hover); }
  .btn-save:active { transform: scale(.98); }

  /* ── List Page ── */
  #listPage {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    display: none;
  }

  .list-item {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: box-shadow .2s, border-color .15s;
    box-shadow: var(--shadow-sm);
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  .list-item:hover {
    box-shadow: var(--shadow-md);
    border-color: #c8c4bb;
  }

  .list-thumb {
    width: 52px;
    height: 52px;
    object-fit: cover;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    flex: 0 0 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
  }

  .list-item-body { flex: 1; min-width: 0; }

  .list-item-body h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .list-item-body .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 2px 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
  }

  .chip.category {
    background: var(--accent-light);
    border-color: #b8ddc0;
    color: var(--accent);
  }

  .list-item-arrow {
    color: var(--border);
    flex-shrink: 0;
  }

  .press-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: rgba(45,90,61,.12);
    opacity: 0;
    transition: opacity 120ms linear;
    border-radius: inherit;
  }

  .load-more {
    padding: 12px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--accent);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }

  .load-more:hover { background: var(--accent-light); }

  .empty {
    text-align: center;
    color: var(--text-muted);
    padding: 40px 20px;
    font-size: 15px;
  }

  .empty svg {
    display: block;
    margin: 0 auto 12px;
    opacity: .3;
  }

  /* ── Photo Modal ── */
  #photoModal {
    display: none;
    position: fixed;
    z-index: 1000;
    inset: 0;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(6px);
    justify-content: center;
    align-items: center;
    animation: fadeIn .15s ease;
  }

  #photoModal img {
    max-width: 90%;
    max-height: 90%;
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    cursor: zoom-out;
  }

  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

  /* ── Scrollbar ── */
  #listPage::-webkit-scrollbar { width: 4px; }
  #listPage::-webkit-scrollbar-track { background: transparent; }
  #listPage::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Loading state ── */
  .loading-indicator {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #detectBadge { display: none !important; }
</style>

<script>
const SUPABASE_URL='https://lpcygniycyffeswzrnms.supabase.co/',SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxwY3lnbml5Y3lmZmVzd3pybm1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwODA5NDIsImV4cCI6MjA3MjY1Njk0Mn0.4bVTsLEwvjyPllLU1-U2vcw3yHkzqj69TZOfuJvSvDQ',SUPABASE_BUCKET='item_images';
const{createClient}=supabase;const supabaseClient=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const video=document.getElementById('video'),mapImg=document.getElementById('map'),mapContainer=document.getElementById('mapContainer'),itemCard=document.getElementById('itemCard'),itemNameDisplay=document.getElementById('itemNameDisplay'),barcodeDisplay=document.getElementById('barcodeDisplay'),dateDisplay=document.getElementById('dateDisplay'),shelfDisplay=document.getElementById('shelfDisplay'),categoryDisplay=document.getElementById('categoryDisplay'),addForm=document.getElementById('addForm'),saveBtn=document.getElementById('saveBtn'),itemNameInput=document.getElementById('itemName'),itemCategoryInput=document.getElementById('itemCategory'),itemShelfInput=document.getElementById('itemShelf'),itemSectionInput=document.getElementById('itemSection'),itemBarcodeInput=document.getElementById('itemBarcode'),listPage=document.getElementById('listPage'),searchForm=document.getElementById('searchForm'),searchInput=document.getElementById('searchInput'),categoryDatalist=document.getElementById('categoryList'),torchBtn=document.getElementById('torchBtn'),detectBadge=document.getElementById('detectBadge'),photoPreview=document.getElementById('photoPreview'),itemPhotoInput=document.getElementById('itemPhotoInput'),itemPhotoData=document.getElementById('itemPhotoData'),itemPhotoDisplay=document.getElementById('itemPhotoDisplay'),photoUploadTrigger=document.getElementById('photoUploadTrigger');

let barcodeDB={},currentCode=null,categoriesSet=new Set(),currentStream=null,torchOn=false,CONFIRMATION_THRESHOLD=3,lastDetectedCode=null,consecutiveDetectCount=0,acceptCooldown=false,PAGE_SIZE=100,lastRenderedItems=[];

// Photo upload trigger
photoUploadTrigger.addEventListener('click',()=>itemPhotoInput.click());

function switchTab(tab){
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  tab.classList.add('active');
  mapContainer.style.display='none';
  video.style.display='none';
  addForm.style.display='none';
  listPage.style.display='none';
  itemCard.classList.add('hidden');
  torchBtn.style.display='none';
  video.classList.remove('fullscreen');

  if(tab.id==='tab-map'){
    mapContainer.style.display='flex';
    itemCard.classList.remove('hidden');
    stopCamera();
  } else if(tab.id==='tab-scan'){
    video.style.display='block';
    video.classList.add('fullscreen');
    itemCard.classList.add('hidden');
    startCamera();
    torchBtn.style.display='flex';
  } else if(tab.id==='tab-add'){
    listPage.style.display='flex';
    stopCamera();
    const all=getAllItemsArray();
    renderList(all,0);
  }
}

document.getElementById('tab-map').addEventListener('click',e=>switchTab(e.currentTarget));
document.getElementById('tab-scan').addEventListener('click',e=>switchTab(e.currentTarget));
document.getElementById('tab-add').addEventListener('click',e=>switchTab(e.currentTarget));

function getAllItemsArray(){
  return Object.entries(barcodeDB).map(([barcode,item])=>({barcode,name:item.name||'',category:item.category||'',shelf:item.shelf||'',section:item.section||'',photo:item.photo||item.photoPath||''}));
}

function levenshtein(a,b){if(a===b)return 0;if(!a.length)return b.length;if(!b.length)return a.length;const m=[];for(let i=0;i<=b.length;i++)m[i]=[i];for(let j=0;j<=a.length;j++)m[0][j]=j;for(let i=1;i<=b.length;i++)for(let j=1;j<=a.length;j++)m[i][j]=b.charAt(i-1)===a.charAt(j-1)?m[i-1][j-1]:Math.min(m[i-1][j-1]+1,m[i][j-1]+1,m[i-1][j]+1);return m[b.length][a.length]}

function updateCategoryDatalist(){
  categoryDatalist.innerHTML='';
  Array.from(categoriesSet).filter(c=>c&&String(c).trim()).sort((a,b)=>a.localeCompare(b,undefined,{sensitivity:'base'})).forEach(c=>{const o=document.createElement('option');o.value=c;categoryDatalist.appendChild(o)});
}

function showItemOnCard(barcode,item){
  const name=item&&item.name?item.name:'Unknown item';
  const shelf=item&&item.shelf?item.shelf:'—';
  const section=item&&item.section?item.section:'—';
  const category=item&&item.category?item.category:'—';

  if(item&&(item.photo||item.photoPath)){
    itemPhotoDisplay.src=item.photo||item.photoPath;
    itemPhotoDisplay.style.display='block';
  } else {
    itemPhotoDisplay.style.display='none';
  }

  itemNameDisplay.textContent=name;
  barcodeDisplay.innerHTML=`Barcode: <span>${escapeHtml(barcode)}</span>`;
  shelfDisplay.innerHTML=`Shelf: <span>${escapeHtml(shelf)} / ${escapeHtml(section)}</span>`;
  categoryDisplay.innerHTML=`<span>${escapeHtml(category)}</span>`;
  dateDisplay.style.display='none';
}

function openItemForEdit(barcode){
  const item=barcodeDB[barcode];
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-map').classList.add('active');
  mapContainer.style.display='flex';
  video.style.display='none';
  listPage.style.display='none';
  itemCard.classList.remove('hidden');
  addForm.style.display='flex';
  torchBtn.style.display='none';

  itemBarcodeInput.value=barcode||'';
  itemNameInput.value=item&&item.name?item.name:'';
  itemCategoryInput.value=item&&item.category?item.category:'';
  itemShelfInput.value=item&&item.shelf?item.shelf:'';
  itemSectionInput.value=item&&item.section?item.section:'';

  showItemOnCard(barcode, item||{});

  if(item&&(item.photo||item.photoPath)){
    const src=item.photo||item.photoPath;
    photoPreview.src=src;
    photoPreview.style.display='block';
    itemPhotoData.value='';
  } else {
    photoPreview.style.display='none';
    itemPhotoData.value='';
    photoPreview.src='';
  }

  saveBtn.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Save Changes`;
}

function renderList(items, startIndex=0){
  lastRenderedItems=items;
  if(startIndex===0) listPage.innerHTML='';
  const end=Math.min(startIndex+PAGE_SIZE,items.length);

  if(items.length===0){
    listPage.innerHTML=`<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>No items found.</div>`;
    return;
  }

  for(let i=startIndex;i<end;i++){
    const it=items[i];
    const div=document.createElement('div');
    div.className='list-item';
    div.setAttribute('data-barcode',it.barcode);

    const thumbHTML=it.photo
      ?`<img class="list-thumb" src="${escapeHtml(it.photo)}" alt="">`
      :`<div class="list-thumb"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;

    div.innerHTML=`
      ${thumbHTML}
      <div class="list-item-body">
        <h3>${escapeHtml(it.name||'Unnamed item')}</h3>
        <div class="chips">
          ${it.category?`<span class="chip category">${escapeHtml(it.category)}</span>`:''}
          <span class="chip">${escapeHtml(it.barcode)}</span>
          ${it.shelf?`<span class="chip">Shelf ${escapeHtml(it.shelf)}/${escapeHtml(it.section||'?')}</span>`:''}
        </div>
      </div>
      <svg class="list-item-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    `;

    const overlay=document.createElement('div');
    overlay.className='press-overlay';
    div.appendChild(overlay);

    div.addEventListener('click',()=>{
      const barcode=div.dataset.barcode;
      const item=barcodeDB[barcode];
      if(item){
        showItemOnCard(barcode, item);
        switchTab(document.getElementById('tab-map'));
      }
    });

    // Long press to edit
    (function(localDiv, barcode, overlayEl){
      let longPressTimer=null;const LP=1250;let pressingStart=null;let raf=null;
      function update(){if(!pressingStart)return;const e=Date.now()-pressingStart;const c=Math.min(1,e/LP);overlayEl.style.opacity=String(0.1+c*.9);if(c<1)raf=requestAnimationFrame(update)}
      function startLP(){clearLP();pressingStart=Date.now();overlayEl.style.transition='opacity 60ms linear';raf=requestAnimationFrame(update);longPressTimer=setTimeout(()=>{longPressTimer=null;pressingStart=null;cancelAnimationFrame(raf);overlayEl.style.opacity='0';openItemForEdit(barcode)},LP)}
      function clearLP(){if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null}if(raf){cancelAnimationFrame(raf);raf=null}pressingStart=null;overlayEl.style.transition='opacity 200ms linear';overlayEl.style.opacity='0'}
      localDiv.addEventListener('mousedown',e=>{if(e.button!==0)return;startLP()});
      localDiv.addEventListener('mouseup',clearLP);
      localDiv.addEventListener('mouseleave',clearLP);
      localDiv.addEventListener('touchstart',e=>{if(e.touches&&e.touches.length>1)return;startLP()},{passive:true});
      localDiv.addEventListener('touchend',clearLP);
      localDiv.addEventListener('touchcancel',clearLP);
      localDiv.addEventListener('contextmenu',e=>e.preventDefault());
      localDiv.addEventListener('selectstart',e=>e.preventDefault());
    })(div,it.barcode,overlay);

    listPage.appendChild(div);
  }

  if(end<items.length){
    const btn=document.createElement('button');
    btn.className='load-more';
    btn.textContent=`Load more (${items.length-end} remaining)`;
    btn.addEventListener('click',()=>{btn.remove();renderList(items,end)});
    listPage.appendChild(btn);
  }
}

function escapeHtml(str){if(!str)return'';return String(str).replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[s]))}

function performSearch(){
  const q=searchInput.value.trim().toLowerCase();
  const all=getAllItemsArray();
  if(!q){renderList(all,0);return}
  const results=[];
  for(const it of all){
    const name=(it.name||'').toLowerCase(),barcode=(it.barcode||'').toLowerCase(),category=(it.category||'').toLowerCase();
    let score=10000;
    if(name===q)score=-1000;else if(barcode===q)score=-900;else if(category===q)score=-950;
    else if(name.startsWith(q))score=-100+name.indexOf(q);else if(category.startsWith(q))score=-120+category.indexOf(q);
    else if(name.includes(q))score=10+name.indexOf(q);else if(category.includes(q))score=5+category.indexOf(q);
    else if(barcode.includes(q))score=20+barcode.indexOf(q);
    else{const lev=levenshtein(q,name);if(name&&lev<=Math.max(2,Math.floor(name.length*.25)))score=50+lev;}
    if(score<10000)results.push({it,score});
  }
  results.sort((a,b)=>a.score-b.score);
  renderList(results.map(r=>r.it),0);
}

searchForm.addEventListener('submit',e=>{e.preventDefault();switchTab(document.getElementById('tab-add'));performSearch()});
let debounceTimer=null;
searchInput.addEventListener('input',()=>{
  switchTab(document.getElementById('tab-add'));
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(()=>{performSearch();debounceTimer=null},150);
});

function dataURLtoBlob(dataURL){const p=dataURL.split(',');const mime=p[0].match(/:(.*?);/)[1];const bin=atob(p[1]);const u8=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);return new Blob([u8],{type:mime})}

async function uploadImageToSupabase(barcode,dataURL){if(!dataURL)return null;const blob=dataURLtoBlob(dataURL);const filename=`${barcode}/${Date.now()}.jpg`;const{error}=await supabaseClient.storage.from(SUPABASE_BUCKET).upload(filename,blob,{cacheControl:'3600',upsert:true});if(error)throw error;return supabaseClient.storage.from(SUPABASE_BUCKET).getPublicUrl(filename).data.publicUrl}

async function saveItemToSupabase(barcode,item){const{error}=await supabaseClient.from('items').upsert({barcode,name:item.name||null,category:item.category||null,shelf:item.shelf||null,section:item.section||null,image_url:item.image_url||null},{onConflict:'barcode'});if(error)throw error}

async function loadDatabaseFromSupabase(){
  const{data,error}=await supabaseClient.from('items').select('*').order('created_at',{ascending:false});
  if(error)throw error;
  barcodeDB={};categoriesSet=new Set();
  for(const row of data){
    barcodeDB[row.barcode]={name:row.name||'',category:row.category||'',shelf:row.shelf||'',section:row.section||'',photo:row.image_url||''};
    if(row.category)categoriesSet.add(row.category);
  }
  updateCategoryDatalist();
}

function captureFrameDataURL(){try{const c=document.createElement('canvas');c.width=video.videoWidth||640;c.height=video.videoHeight||480;c.getContext('2d').drawImage(video,0,0,c.width,c.height);return c.toDataURL('image/png')}catch(e){return null}}

itemPhotoInput.addEventListener('change',e=>{
  const f=e.target.files&&e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{itemPhotoData.value=ev.target.result;photoPreview.src=ev.target.result;photoPreview.style.display='block'};
  r.readAsDataURL(f);
});

function startScanner(){
  lastDetectedCode=null;consecutiveDetectCount=0;acceptCooldown=false;
  Quagga.init({inputStream:{name:'Live',type:'LiveStream',target:video},decoder:{readers:['ean_reader','upc_reader','code_128_reader']},locate:true},err=>{if(err){console.error(err);return}Quagga.start()});
  Quagga.onDetected(result=>{
    if(!result||!result.codeResult)return;
    const code=result.codeResult.code;
    if(acceptCooldown)return;
    if(lastDetectedCode===code)consecutiveDetectCount++;else{lastDetectedCode=code;consecutiveDetectCount=1}
    if(consecutiveDetectCount>=CONFIRMATION_THRESHOLD){
      acceptCooldown=true;lastDetectedCode=null;consecutiveDetectCount=0;currentCode=code;
      const item=barcodeDB[code];
      if(item){
        showItemOnCard(code, item);
        switchTab(document.getElementById('tab-map'));
      } else {
        itemNameDisplay.textContent='❌ Not in database';
        barcodeDisplay.innerHTML=`Barcode: <span>${escapeHtml(code)}</span>`;
        shelfDisplay.innerHTML='Shelf: —';categoryDisplay.textContent='—';
        itemBarcodeInput.value=code;
        const dataURL=captureFrameDataURL();
        if(dataURL){itemPhotoData.value=dataURL;photoPreview.src=dataURL;photoPreview.style.display='block';}
        else{itemPhotoData.value='';photoPreview.style.display='none';}
        saveBtn.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Save Item`;
        video.style.display='none';addForm.style.display='flex';itemCard.classList.remove('hidden');
        stopCamera();
      }
      setTimeout(()=>{acceptCooldown=false},700);
    }
  });
}

function stopCamera(){
  acceptCooldown=false;lastDetectedCode=null;consecutiveDetectCount=0;
  if(currentStream){currentStream.getTracks().forEach(t=>t.stop());currentStream=null}
  if(video.srcObject){try{video.srcObject.getTracks().forEach(t=>t.stop())}catch(e){}video.srcObject=null}
  if(window.Quagga){try{Quagga.stop()}catch(e){}}
}

async function startCamera(){
  acceptCooldown=false;lastDetectedCode=null;consecutiveDetectCount=0;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    currentStream=stream;video.srcObject=stream;video.play().catch(()=>{});torchOn=false;
    torchBtn.classList.remove('on');
    startScanner();
  }catch(err){alert('Camera error: '+err.message)}
}

async function toggleTorch(){
  if(!currentStream){alert('Camera not started');return}
  const track=currentStream.getVideoTracks()[0];
  if(!track)return;
  try{await track.applyConstraints({advanced:[{torch:!torchOn}]});torchOn=!torchOn;torchBtn.classList.toggle('on',torchOn)}
  catch(err){alert('Torch not supported on this device.')}
}

torchBtn.addEventListener('click',toggleTorch);

async function resizeDataURL(dataURL,maxWidth=1024,quality=0.75){
  return new Promise((res,rej)=>{const img=new Image();img.onload=()=>{const scale=Math.min(1,maxWidth/img.width);const w=Math.round(img.width*scale),h=Math.round(img.height*scale);const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);try{res(c.toDataURL('image/jpeg',quality))}catch(e){rej(e)}};img.onerror=()=>rej(new Error('Image load failed'));img.crossOrigin='anonymous';img.src=dataURL});
}

saveBtn.addEventListener('click',async()=>{
  try{
    const name=itemNameInput.value.trim(),category=itemCategoryInput.value.trim(),shelf=itemShelfInput.value.trim(),section=itemSectionInput.value.trim(),barcode=itemBarcodeInput.value.trim();
    if(!name||!shelf||!section||!barcode||!category){alert('Please fill in all fields including category.');return}
    let finalPhotoUrl=null;
    const inlinePhoto=itemPhotoData.value||null;
    if(inlinePhoto){
      let uploadData;
      try{uploadData=await resizeDataURL(inlinePhoto)}catch(e){uploadData=inlinePhoto}
      finalPhotoUrl=await uploadImageToSupabase(barcode,uploadData);
    } else if(barcodeDB[barcode]&&barcodeDB[barcode].photo){
      finalPhotoUrl=barcodeDB[barcode].photo;
    }
    await saveItemToSupabase(barcode,{name,category,shelf,section,image_url:finalPhotoUrl});
    if(category)categoriesSet.add(category);
    updateCategoryDatalist();
    await loadDatabaseFromSupabase();
    const saved=barcodeDB[barcode];
    showItemOnCard(barcode, saved||{name,shelf,section,category});
    addForm.style.display='none';
    switchTab(document.getElementById('tab-map'));
    alert('✅ Item saved successfully.');
  }catch(err){console.error('Save failed:',err);alert('Save failed: '+(err.message||err))}
});

// Photo modal
const photoModal=document.getElementById('photoModal'),modalPhoto=document.getElementById('modalPhoto');
itemPhotoDisplay.addEventListener('click',()=>{if(itemPhotoDisplay.src){modalPhoto.src=itemPhotoDisplay.src;photoModal.style.display='flex'}});
photoModal.addEventListener('click',()=>{photoModal.style.display='none';modalPhoto.src=''});

// Map pan/zoom
let scale=1,minScale=0.1,maxScale=6,panX=0,panY=0,isPanning=false,panStartX=0,panStartY=0,lastPanX=0,lastPanY=0,lastTouchDist=null,lastTouchCenter=null;
function applyTransform(){mapImg.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

mapContainer.addEventListener('wheel',e=>{if(mapContainer.style.display==='none')return;e.preventDefault();const rect=mapImg.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;const zf=Math.exp(-e.deltaY*.0015);const ns=clamp(scale*zf,minScale,maxScale);const sr=ns/scale;panX=(panX-mx)*sr+mx;panY=(panY-my)*sr+my;scale=ns;applyTransform()},{passive:false});
mapContainer.addEventListener('pointerdown',e=>{if(e.pointerType==='touch')return;isPanning=true;panStartX=e.clientX;panStartY=e.clientY;lastPanX=panX;lastPanY=panY;mapContainer.setPointerCapture(e.pointerId)});
mapContainer.addEventListener('pointermove',e=>{if(!isPanning)return;panX=lastPanX+(e.clientX-panStartX);panY=lastPanY+(e.clientY-panStartY);applyTransform()});
mapContainer.addEventListener('pointerup',e=>{isPanning=false;try{mapContainer.releasePointerCapture(e.pointerId)}catch(_){}});
mapContainer.addEventListener('pointercancel',e=>{isPanning=false;try{mapContainer.releasePointerCapture(e.pointerId)}catch(_){}});
mapContainer.addEventListener('touchstart',e=>{if(!e.touches)return;if(e.touches.length===1){lastTouchDist=null;isPanning=true;panStartX=e.touches[0].clientX;panStartY=e.touches[0].clientY;lastPanX=panX;lastPanY=panY}else if(e.touches.length===2){isPanning=false;const t0=e.touches[0],t1=e.touches[1];lastTouchDist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);lastTouchCenter={x:(t0.clientX+t1.clientX)/2,y:(t0.clientY+t1.clientY)/2}}},{passive:false});
mapContainer.addEventListener('touchmove',e=>{if(!e.touches)return;if(e.touches.length===1&&isPanning){e.preventDefault();panX=lastPanX+(e.touches[0].clientX-panStartX);panY=lastPanY+(e.touches[0].clientY-panStartY);applyTransform()}else if(e.touches.length===2){e.preventDefault();const t0=e.touches[0],t1=e.touches[1];const cd=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);if(lastTouchDist){const ns=clamp(scale*(cd/lastTouchDist),minScale,maxScale);const rect=mapImg.getBoundingClientRect();const cx=(t0.clientX+t1.clientX)/2-rect.left,cy=(t0.clientY+t1.clientY)/2-rect.top;const sr=ns/scale;panX=(panX-cx)*sr+cx;panY=(panY-cy)*sr+cy;scale=ns;applyTransform()}lastTouchDist=cd}},{passive:false});
mapContainer.addEventListener('touchend',e=>{if(!e.touches||e.touches.length===0){isPanning=false;lastTouchDist=null}else if(e.touches.length===1){isPanning=true;panStartX=e.touches[0].clientX;panStartY=e.touches[0].clientY;lastPanX=panX;lastPanY=panY;lastTouchDist=null}},{passive:false});

// Init
mapContainer.style.display='flex';
mapImg.style.cssText='height:100%;width:auto;object-fit:contain;transform:none;display:block;';
mapImg.addEventListener('load',()=>{mapImg.style.cssText='height:100%;width:auto;object-fit:contain;transform:none;display:block;'});

window.addEventListener('load',async()=>{
  try{await loadDatabaseFromSupabase()}catch(e){console.warn('Failed to load items',e)}
});
</script>
