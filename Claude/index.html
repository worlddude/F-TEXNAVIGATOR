<!DOCTYPE html>
<html lang="da">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Locator</title>
  <link rel="icon" type="image/png" href="item-loc-pin-v2-1024.png" />
  <link rel="apple-touch-icon" href="item-loc-pin-v2-1024.png" />
  <meta name="theme-color" content="#0e1f3d" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Geist+Mono:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      /* surfaces */
      --bg: #0e1f3d;
      --bg2: #162a50;
      --bg3: #1e3460;
      --surface: rgba(255, 255, 255, .045);
      --surface2: rgba(255, 255, 255, .075);
      --surface3: rgba(255, 255, 255, .11);
      --border: rgba(255, 255, 255, .08);
      --border2: rgba(255, 255, 255, .14);
      --border3: rgba(255, 255, 255, .22);
      /* type */
      --text: #eaf1ff;
      --text-dim: rgba(234, 241, 255, .68);
      --muted: rgba(234, 241, 255, .42);
      --faint: rgba(234, 241, 255, .26);
      /* accent — electric blue */
      --accent: #3d8eff;
      --accent-2: #7fb4ff;
      --accent-bg: rgba(61,142,255, .1);
      --accent-bg-2: rgba(61,142,255, .18);
      --accent-glow: rgba(61,142,255, .35);
      /* radii */
      --r: 16px;
      --r-md: 12px;
      --r-sm: 10px;
      --r-xs: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      font-family: 'Syne', sans-serif;
      background: #081a3a;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(ellipse at top, #244680 0%, #112a55 55%, #081a3a 100%);
      overflow: hidden;
    }

    .phone-shell {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, .06),
        0 1px 0 0 rgba(255, 255, 255, .04) inset,
        0 60px 140px rgba(0, 0, 0, .8);
      border-radius: 0;
    }

    @media(min-width:500px) {
      .phone-shell {
        border-radius: 44px;
        min-height: 840px;
        max-height: 880px;
      }
    }

    .phone-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: .025;
      pointer-events: none;
      z-index: 9999;
      border-radius: inherit;
      mix-blend-mode: overlay;
    }

    /* ============ HEADER ============ */
    .header {
      padding: calc(14px + env(safe-area-inset-top, 0px)) 13px 10px;
      flex-shrink: 0;
      z-index: 10;
      background: var(--bg);
      touch-action: none;
      position: relative;
    }

    @media(min-width:500px) {
      .header {
        padding-top: 22px;
      }
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .wordmark {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .04em;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .wordmark-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow), 0 0 0 2px rgba(61,142,255, .15);
      flex-shrink: 0;
      animation: brandPulse 2.6s ease-in-out infinite;
    }

    @keyframes brandPulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .55;
      }
    }

    .wordmark em {
      color: var(--muted);
      font-style: normal;
      font-weight: 600;
    }

    .appver {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: .5px;
      color: rgba(234, 241, 255, .4);
      margin-left: 6px;
      align-self: flex-end;
      padding-bottom: 2px;
    }

    .search-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 13px;
      color: var(--text-dim);
      pointer-events: none;
      display: flex;
      transition: color .2s;
    }

    .search-wrap input {
      width: 100%;
      height: 40px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 50px;
      padding: 0 16px 0 38px;
      font-size: 13px;
      font-family: 'Syne', sans-serif;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: border-color .18s, box-shadow .18s, background .18s;
    }

    .search-wrap input::placeholder {
      color: var(--muted);
    }

    .search-wrap input:focus {
      border-color: rgba(61,142,255, .55);
      background: rgba(61,142,255, .04);
      box-shadow: 0 0 0 3px rgba(61,142,255, .14);
    }

    .search-wrap input:focus~.search-icon {
      color: var(--accent);
    }

    /* ============ TABS ============ */
    .tabs {
      display: flex;
      gap: 0;
      background: rgba(255, 255, 255, .035);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 4px;
      position: relative;
      box-shadow: 0 1px 0 rgba(255, 255, 255, .04) inset;
    }

    .tabs button {
      flex: 1;
      background: none;
      border: 0;
      color: var(--text-dim);
      padding: 10px 6px;
      font-size: 11px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 50px;
      transition: color .2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      position: relative;
      z-index: 1;
    }

    .tabs button svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
      stroke-width: 2.2;
      transition: transform .25s cubic-bezier(.4, 0, .2, 1);
    }

    .tabs button:hover {
      color: var(--text);
    }

    .tabs button.active {
      background: linear-gradient(180deg, var(--accent) 0%, #2a78f0 100%);
      color: #0e1f3d;
      box-shadow:
        0 0 0 1px rgba(61,142,255, .35),
        0 4px 14px rgba(61,142,255, .35),
        0 0 24px rgba(61,142,255, .25),
        inset 0 1px 0 rgba(255, 255, 255, .35);
    }

    .tabs button.active svg {
      transform: scale(1.08);
    }

    /* ============ MAIN ============ */
    .main {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ============ MAP ============ */
    #mapContainer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      touch-action: none;
      background:
        radial-gradient(ellipse at center, #162a50 0%, #0e1f3d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #mapContainer::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, .025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .025) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      mask-image: radial-gradient(ellipse at center, #000 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 80%);
    }

    #map {
      display: block;
      will-change: transform;
      transform-origin: 0 0;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      height: 100%;
      width: auto;
      object-fit: contain;
    }

    /* ============ CAMERA ============ */
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      position: absolute;
      inset: 0;
      background: #000;
    }

    #video.fullscreen {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      object-fit: cover;
    }

    /* ============ SCAN OVERLAY (refined) ============ */
    #scanOverlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 11;
      pointer-events: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0;
      transform: translateY(-46px);
    }

    #scanOverlay.on {
      display: flex;
    }

    #scanOverlay::before {
      /* vignette removed — no darkening on the scan view */
      display: none;
    }

    #scanHint {
      color: var(--text);
      font-size: 10.5px;
      font-family: 'Geist Mono', monospace;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-top: 28px;
      text-align: center;
      padding: 7px 14px;
      background: rgba(12, 12, 14, .72);
      backdrop-filter: blur(14px);
      border: 1px solid var(--border2);
      border-radius: 50px;
      position: relative;
      z-index: 1;
    }

    #scanHint::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 8px;
      vertical-align: middle;
      box-shadow: 0 0 8px var(--accent-glow);
      animation: brandPulse 1.4s ease-in-out infinite;
    }

    #scanHint.notfound {
      background: rgba(214, 40, 40, .94);
      color: #fff;
      border-color: rgba(255, 150, 150, .7);
    }

    #scanHint.notfound::before {
      background: #fff;
      box-shadow: 0 0 8px rgba(255, 255, 255, .6);
      animation: none;
    }

    .sf {
      width: 280px;
      height: 200px;
      position: relative;
      z-index: 1;
    }

    .sf::before,
    .sf::after,
    .sf span::before,
    .sf span::after {
      content: '';
      position: absolute;
      width: 32px;
      height: 32px;
      border-color: var(--accent);
      border-style: solid;
      filter: drop-shadow(0 0 6px var(--accent-glow));
    }

    .sf::before {
      top: 0;
      left: 0;
      border-width: 2.5px 0 0 2.5px;
      border-radius: 8px 0 0 0;
    }

    .sf::after {
      top: 0;
      right: 0;
      border-width: 2.5px 2.5px 0 0;
      border-radius: 0 8px 0 0;
    }

    .sf span::before {
      bottom: 0;
      left: 0;
      border-width: 0 0 2.5px 2.5px;
      border-radius: 0 0 0 8px;
    }

    .sf span::after {
      bottom: 0;
      right: 0;
      border-width: 0 2.5px 2.5px 0;
      border-radius: 0 0 8px 0;
    }

    .sf-inner-border {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(61,142,255, .14);
      border-radius: 6px;
    }

    .sf::before,
    .sf::after,
    .sf span::before,
    .sf span::after {
      animation: cornerBreathe 2.4s ease-in-out infinite;
    }

    @keyframes cornerBreathe {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .65;
      }
    }

    .sl {
      position: absolute;
      left: 8px;
      right: 8px;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 20%, var(--accent-2) 50%, var(--accent) 80%, transparent 100%);
      box-shadow:
        0 0 14px 1px rgba(61,142,255, .65),
        0 0 32px rgba(61,142,255, .25);
      animation: scan 2.4s cubic-bezier(.4, 0, .6, 1) infinite;
      border-radius: 2px;
    }

    .sl::before {
      content: '';
      position: absolute;
      inset: -16px 0;
      background: linear-gradient(180deg, transparent 0%, rgba(61,142,255, .14) 50%, transparent 100%);
      pointer-events: none;
    }

    @keyframes scan {
      0% {
        top: 8px;
        opacity: .9;
      }

      48% {
        top: calc(100% - 10px);
        opacity: 1;
      }

      52% {
        top: calc(100% - 10px);
        opacity: 1;
      }

      100% {
        top: 8px;
        opacity: .9;
      }
    }

    /* ============ TORCH ============ */
    #torchBtn {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 40px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 60;
      background: rgba(12, 12, 14, .78);
      backdrop-filter: blur(16px);
      color: var(--text);
      border: 1px solid var(--border2);
      padding: 10px 18px;
      border-radius: 50px;
      font-size: 10.5px;
      font-family: 'Geist Mono', monospace;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      display: none;
      cursor: pointer;
      align-items: center;
      gap: 7px;
      transition: all .2s;
    }

    #torchBtn:hover {
      background: rgba(20, 20, 24, .85);
      border-color: var(--border3);
    }

    #torchBtn.on {
      background: rgba(61,142,255, .14);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 24px rgba(61,142,255, .28);
    }

    /* ============ ITEM CARD ============ */
    .item-card {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: transparent;
      border-top: none;
      padding: 14px 13px calc(16px + env(safe-area-inset-bottom, 0px) + 20px);
      flex-shrink: 0;
      z-index: 20;
      pointer-events: none;
      touch-action: none;
    }

    .item-card.hidden {
      display: none;
    }

    .card-row {
      pointer-events: auto;
      background:
        linear-gradient(180deg, rgba(22, 22, 26, .82) 0%, rgba(12, 12, 14, .88) 100%);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
      border-radius: var(--r);
      border: 1px solid var(--border2);
      padding: 13px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, .06) inset,
        0 -1px 0 rgba(0, 0, 0, .25) inset,
        0 18px 38px rgba(0, 0, 0, .55);
    }

    .card-row {
      display: flex;
      gap: 13px;
      align-items: flex-start;
      position: relative;
      overflow: hidden;
    }

    .card-row::before {
      /* top shimmer */
      content: '';
      position: absolute;
      top: 0;
      left: 14px;
      right: 14px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(61,142,255, .35), transparent);
    }

    #itemPhotoDisplay {
      width: 62px;
      height: 62px;
      object-fit: cover;
      border-radius: var(--r-md);
      border: 1px solid var(--border3);
      flex-shrink: 0;
      cursor: zoom-in;
      box-shadow: 0 6px 18px rgba(0, 0, 0, .4);
    }

    .card-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 1px;
    }

    .card-info h2 {
      font-size: 15.5px;
      font-weight: 700;
      letter-spacing: -.015em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      line-height: 1.15;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }

    .chip {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      padding: 4px 9px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--text-dim);
      letter-spacing: .04em;
      font-weight: 400;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      line-height: 1;
    }

    .chip b {
      color: var(--text);
      font-weight: 600;
    }

    .chip.hi {
      background: var(--accent-bg);
      border-color: rgba(61,142,255, .28);
      color: var(--accent);
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }

    .chip.hi:hover {
      background: var(--accent-bg-2);
      border-color: rgba(61,142,255, .45);
    }

    .chip.hi b {
      color: var(--accent);
    }

    /* temperature-zone chips (in the item card) */
    .chip.t-frost { background: rgba(80, 160, 255, .14); border-color: rgba(80, 160, 255, .4); color: #9fc8ff; }
    .chip.t-kol { background: rgba(52, 200, 200, .13); border-color: rgba(52, 200, 200, .38); color: #8fe3e3; }
    .chip.t-kolo { background: rgba(190, 190, 200, .12); border-color: rgba(200, 200, 210, .32); color: #dce0ea; }

    /* temperature filter (in the list) */
    .temp-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .temp-chip {
      flex: 1;
      padding: 9px 0;
      text-align: center;
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      letter-spacing: .06em;
      border-radius: 50px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
    }

    .temp-chip.active {
      background: var(--accent-bg);
      border-color: rgba(61, 142, 255, .4);
      color: var(--accent);
    }

    /* temp filter buttons colored to match the card chips */
    .temp-chip[data-t="frost"] { background: rgba(80, 160, 255, .14); border-color: rgba(80, 160, 255, .4); color: #9fc8ff; }
    .temp-chip[data-t="frost"].active { background: rgba(80, 160, 255, .3); border-color: rgba(80, 160, 255, .72); color: #cfe2ff; }
    .temp-chip[data-t="køl"] { background: rgba(52, 200, 200, .13); border-color: rgba(52, 200, 200, .38); color: #8fe3e3; }
    .temp-chip[data-t="køl"].active { background: rgba(52, 200, 200, .28); border-color: rgba(52, 200, 200, .68); color: #c4f3f3; }
    .temp-chip[data-t="kolo"] { background: rgba(190, 190, 200, .12); border-color: rgba(200, 200, 210, .32); color: #dce0ea; }
    .temp-chip[data-t="kolo"].active { background: rgba(200, 200, 210, .26); border-color: rgba(210, 210, 220, .62); color: #f0f2f8; }

    /* ============ LIST PAGE ============ */
    #listPage {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 12px calc(24px + env(safe-area-inset-bottom, 0px));
      display: none;
      flex-direction: column;
      gap: 4px;
    }

    /* keep list children at their natural size and scroll instead of squeezing */
    #listPage > * {
      flex-shrink: 0;
    }

    #listPage::-webkit-scrollbar {
      width: 3px;
    }

    #listPage::-webkit-scrollbar-track {
      background: transparent;
    }

    #listPage::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }

    .list-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 10px 11px;
      display: flex;
      align-items: center;
      gap: 11px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background .14s, border-color .14s, transform .14s;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      flex-shrink: 0;
    }

    .list-item:hover {
      background: var(--surface2);
      border-color: var(--border2);
    }

    .list-item:active {
      transform: scale(.99);
    }

    .list-thumb {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: var(--r-xs);
      border: 1px solid var(--border2);
      flex: 0 0 44px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      overflow: hidden;
    }

    .list-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .list-body h3 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      line-height: 1.1;
    }

    .list-arrow {
      color: var(--faint);
      flex-shrink: 0;
      transition: transform .15s, color .15s;
    }

    .list-item:hover .list-arrow {
      color: var(--accent);
      transform: translateX(2px);
    }

    .load-more {
      height: 38px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--accent);
      font-size: 10.5px;
      font-family: 'Geist Mono', monospace;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .14s, border-color .14s;
      margin-top: 4px;

            .order('created_at', { ascending: false }).limit(GPT_MAX - rows.length);

      function initGPT() {
        const gi = $('gptInput'), gs = $('gptStatus'), gr = $('gptReasoning');
        if (!gi) return;

        const think = (txt, delay) => new Promise(r => setTimeout(() => { gr.textContent = txt; r() }, delay));
        let busy = false;

        gi.onkeydown = async e => {
          if (e.key !== 'Enter' || busy) return;
          const val = gi.value.trim();
          if (!val) return;
          busy = true;
          gs.textContent = 'Gemini tænker...';

          try {
            await think('Finder relevante varer...', 250);
            const catalog = await gptCatalog(val);
            await think(`Sender ${catalog.length} varer til AI...`, 250);
            let barcodes;
            if (GEMINI_PROXY_URL) {
              // Edge Function proxy — Gemini-nøglen bor på serveren
              const resp = await fetch(GEMINI_PROXY_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SB_KEY}`, 'apikey': SB_KEY },
                body: JSON.stringify({ query: val, catalog })
              });
              if (!resp.ok) throw new Error('AI-proxy-fejl (' + resp.status + ')');
              barcodes = (await resp.json()).barcodes;
            } else {
              const prompt = `Du er en indkøbsassistent. Her er et udvalg af butikkens varekatalog: ${JSON.stringify(catalog)}. Brugeren spørger: "${val}". Find de varer der passer bedst til brugerens ønske (tænk på synonymer, sprog og behov). Returner KUN et JSON array med stregkoderne på de matchende varer. Hvis intet matcher, returner []. Ingen forklaring, kun JSON.`;

              const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${GEMINI_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }],
                  generationConfig: { responseMimeType: 'application/json' }
                })
              });

              if (!resp.ok) {
                const errData = await resp.json().catch(() => ({}));
                const msg = errData.error?.message || 'API-fejl';
                // Parse retry time if available
                const wait = msg.match(/retry in ([\d.]+)s/);
                if (wait) {
                  let sec = Math.ceil(parseFloat(wait[1]));
                  const itv = setInterval(() => {
                    gs.textContent = `Vent venligst ${sec}s før næste søgning...`;
                    if (--sec < 0) { clearInterval(itv); gs.textContent = 'Klar til ny søgning!'; }
                  }, 1000);
                  throw new Error('Søge-grænse nået.');
                }
                throw new Error(msg);
              }

              const data = await resp.json();
              const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
              if (!text) throw new Error('Ingen svar fra AI. Prøv igen.');
              barcodes = JSON.parse(text.replace(/```json|```/g, '').trim());
            }

            if (Array.isArray(barcodes) && barcodes.length > 0) {
              const { data: rows } = await db.from('items').select('*').in('barcode', barcodes.map(String));
              const results = mergeRows(rows || []);
              if (!results.length) {
                gs.textContent = 'Gemini kunne ikke finde noget der matchede i kataloget.';
                return;
              }
              await think('Gemini fandt de perfekte varer!', 200);
              gs.textContent = `Jeg har fundet ${results.length} anbefalinger til dig.`;
              setTimeout(() => {
                $('gptModal').classList.remove('on');
                gi.value = ''; gs.textContent = ''; gr.textContent = '';
                showGptResults(val, results);
              }, 1000);
            } else {
              gs.textContent = 'Gemini kunne ikke finde noget der matchede i kataloget.';
            }
          } catch (err) {
            console.error('Gemini Error:', err);
            if (!gs.textContent.includes('Vent venligst')) {
              gs.textContent = 'Fejl: ' + err.message;
            }
          } finally { busy = false; }
        };
      }

      /* ============ DATA LAYER (server-side paging & search) ============ */

      // Cache fetched rows in bDB and return them in app shape.
      function mergeRows(rows) {
        for (const r of rows) {
          // auto-detect which column holds the temperature zone (Kolo / Køl / Frost)
          if (!TEMP_KEY) {
            for (const k of Object.keys(r)) {
              if (KNOWN_COLS.has(k)) continue;
              if (typeof r[k] === 'string' && tempKey(r[k])) { TEMP_KEY = k; break; }
            }
          }
          const temp = TEMP_KEY ? (r[TEMP_KEY] || '') : '';
          if (tempKey(temp)) hasTemp = true;
          bDB[r.barcode] = { name: r.name || '', category: r.category || '', shelf: r.shelf || '', section: r.section || '', photo: r.image_url || '', created_at: r.created_at || '', temp };
          if (r.category) cats.add(r.category);
        }
        return rows.map(r => ({ barcode: r.barcode, ...bDB[r.barcode] }));
      }

      async function fetchPage(q, offset) {
        let qy = db.from('items').select('*')
          .order('category', { ascending: true })
          .order('name', { ascending: true })
          .range(offset, offset + PAGE - 1);
        const s = sbSafe(q);
        if (s) qy = qy.or(`name.ilike.%${s}%,category.ilike.%${s}%,barcode.ilike.${s}%`);
        if (tempFilter && TEMP_KEY) {
          if (tempFilter === 'frost') qy = qy.or(`${TEMP_KEY}.ilike.frost%,${TEMP_KEY}.ilike.frys%`);
          else if (tempFilter === 'køl') qy = qy.ilike(TEMP_KEY, 'kø%');
          else qy = qy.ilike(TEMP_KEY, 'kol%');
        }
        const { data, error } = await qy;
        if (error) throw error;
        return mergeRows(data || []);
      }

      // Scan lookups hit the server directly, so items work without preloading the table.
      async function lookupBarcode(code) {

          const { data, error } = await db.from('items').select('*').eq('barcode', code).limit(1);
          if (error) throw error;
          if (data && data.length) { mergeRows(data); return bDB[code]; }
        } catch (e) { console.warn('Opslag fejlede:', e); }

          list.offset += items.length; list.done = items.length < PAGE;
          renderItems(items, false);
          setListMsg(list.offset ? '' : 'Ingen varer fundet');
          updateLoadMore();
        } catch (e) {
          console.warn(e);
          if (my === list.req) updateLoadMore('Prøv igen');
        } finally { if (my === list.req) list.loading = false; }
      }

      function openList() { list.q = searchInput.value.trim(); refreshList(); }

      // Auto-load the next page when the "load more" button scrolls into view.
      const moreIO = ('IntersectionObserver' in window)
        ? new IntersectionObserver(es => { if (es.some(x => x.isIntersecting)) loadMore(); }, { root: listPage, rootMargin: '300px' })
        : null;

      let dt = null;
      searchForm.addEventListener('submit', e => { e.preventDefault(); searchInput.blur(); clearTimeout(dt); suppressListLoad = true; switchTab($('tab-add')); openList(); });
      searchInput.addEventListener('input', () => {
        if (!$('tab-add').classList.contains('active')) { suppressListLoad = true; switchTab($('tab-add')); }
        clearTimeout(dt); dt = setTimeout(openList, 300);
      });

      function startScanner() {
        lastC = null; cnt = 0; cool = false;
        let notFoundTimer = null;
        Quagga.init({ inputStream: { name: 'Live', type: 'LiveStream', target: video }, decoder: { readers: ['ean_reader', 'upc_reader', 'code_128_reader'] }, locate: true }, err => { if (err) { console.error(err); return } Quagga.start() });
        Quagga.onDetected(async res => {
          if (!res?.codeResult || cool) return;
          const code = res.codeResult.code;
          if (lastC === code) cnt++; else { lastC = code; cnt = 1 }
          if (cnt < CT) return;
          cool = true; lastC = null; cnt = 0;
          const sh = $('scanHint');
          if (sh) { sh.textContent = 'Slår stregkode op…'; sh.classList.remove('notfound'); }
          const item = await lookupBarcode(code);
          if (item) { showCard(code, item); switchTab($('tab-map')); cool = false; return; }
          // Locator is read-only — products are only added in the separate add app.
          // Show a "not found" hint and keep scanning so the user can try again.
          if (sh) {
            sh.textContent = 'Stregkode ikke fundet — prøv igen';
            sh.classList.add('notfound');
            clearTimeout(notFoundTimer);
            notFoundTimer = setTimeout(() => { sh.textContent = 'Hold stregkoden inden for rammen'; sh.classList.remove('notfound'); }, 2400);
          }
          setTimeout(() => { cool = false }, 700);
        });
      }

      function stopCam() { cool = false; lastC = null; cnt = 0; if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null } if (video.srcObject) { try { video.srcObject.getTracks().forEach(t => t.stop()) } catch (e) { } video.srcObject = null } if (window.Quagga) { try { Quagga.stop() } catch (e) { } } }

      async function startCam() { cool = false; lastC = null; cnt = 0; try { const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); stream = s; video.srcObject = s; video.play().catch(() => { }); torchOn = false; torchBtn.classList.remove('on'); startScanner() } catch (err) { alert('Kamerafejl: ' + err.message) } }

      async function toggleTorch() { if (!stream) return; const t = stream.getVideoTracks()[0]; if (!t) return; try { await t.applyConstraints({ advanced: [{ torch: !torchOn }] }); torchOn = !torchOn; torchBtn.classList.toggle('on', torchOn) } catch (e) { alert('Lommelygten understøttes ikke på denne enhed.') } }
      torchBtn.addEventListener('click', toggleTorch);

      // Photo modal
      const photoModal = $('photoModal'), modalPhoto = $('modalPhoto');
      photoDisp.addEventListener('click', () => { if (photoDisp.src) { modalPhoto.src = photoDisp.src; photoModal.style.display = 'flex' } });
      photoModal.addEventListener('click', () => { photoModal.style.display = 'none'; modalPhoto.src = '' });

      // Map pan/zoom
      let sc = 1, mn = 0.5, mx = 6, px = 0, py = 0, pan = false, psx = 0, psy = 0, lpx = 0, lpy = 0, ltd = null, lastDrag = 0;
      function at() {
        if (!mapImg.offsetWidth) return;
        const cw = mapCon.clientWidth, ch = mapCon.clientHeight, iw = mapImg.offsetWidth * sc, ih = mapImg.offsetHeight * sc;
        // keep the map covering the whole view (no blue edges); center on an axis if the map is smaller than the view
        px = iw >= cw ? cl(px, cw - iw, 0) : (cw - iw) / 2;
        py = ih >= ch ? cl(py, ch - ih, 0) : (ch - ih) / 2;
        mapWrap.style.transform = `translate(${px}px,${py}px) scale(${sc})`;
      }
      function atNoTrans() {
        mapWrap.classList.add('no-transition');
        at();
        setTimeout(() => mapWrap.classList.remove('no-transition'), 50);
      }
      function cl(v, a, b) { return Math.max(a, Math.min(b, v)) }
      mapCon.addEventListener('wheel', e => { e.preventDefault(); const r = mapImg.getBoundingClientRect(), zf = Math.exp(-e.deltaY * .0015), ns = cl(sc * zf, mn, mx), sr = ns / sc; px -= (e.clientX - r.left) * (sr - 1); py -= (e.clientY - r.top) * (sr - 1); sc = ns; atNoTrans() }, { passive: false });
      mapCon.addEventListener('pointerdown', e => { if (e.pointerType === 'touch') return; pan = true; lastDrag = 0; psx = e.clientX; psy = e.clientY; lpx = px; lpy = py; mapCon.setPointerCapture(e.pointerId) });
      mapCon.addEventListener('pointermove', e => { if (!pan) return; lastDrag = Math.hypot(e.clientX - psx, e.clientY - psy); px = lpx + (e.clientX - psx); py = lpy + (e.clientY - psy); atNoTrans() });
      mapCon.addEventListener('pointerup', e => { pan = false; try { mapCon.releasePointerCapture(e.pointerId) } catch (_) { } });
      mapCon.addEventListener('pointercancel', e => { pan = false; try { mapCon.releasePointerCapture(e.pointerId) } catch (_) { } });
      mapCon.addEventListener('touchstart', e => { lastDrag = 0; if (e.touches.length === 1) { ltd = null; pan = true; psx = e.touches[0].clientX; psy = e.touches[0].clientY; lpx = px; lpy = py } else if (e.touches.length === 2) { pan = false; ltd = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY) } }, { passive: false });
      mapCon.addEventListener('touchmove', e => { if (e.touches.length === 1 && pan) { e.preventDefault(); px = lpx + (e.touches[0].clientX - psx); py = lpy + (e.touches[0].clientY - psy); atNoTrans() } else if (e.touches.length === 2) { e.preventDefault(); const cd = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY); if (ltd) { const ns = cl(sc * (cd / ltd), mn, mx), r = mapImg.getBoundingClientRect(), cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left, cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top, sr = ns / sc; px -= cx * (sr - 1); py -= cy * (sr - 1); sc = ns; atNoTrans() } ltd = cd } }, { passive: false });
      mapCon.addEventListener('touchend', e => { if (!e.touches.length) { pan = false; ltd = null } else if (e.touches.length === 1) { pan = true; psx = e.touches[0].clientX; psy = e.touches[0].clientY; lpx = px; lpy = py; ltd = null } }, { passive: false });

      mapCon.addEventListener('click', e => {
        if (lastDrag > 8) return; // ignore the click fired at the end of a pan
        if (aisleH.classList.contains('active')) {
          mapCard.classList.toggle('flipped');
        }
      });

      // Init
      mapCon.style.display = 'flex';
      const MS = 'height:100%;width:auto;display:block;';
      mapImg.setAttribute('style', MS);
      mapImg.addEventListener('load', () => {
        mapImg.setAttribute('style', MS);
        px = (mapCon.clientWidth - mapImg.offsetWidth) / 2;
        py = (mapCon.clientHeight - mapImg.offsetHeight) / 2;
        atNoTrans();
      });
      window.addEventListener('load', () => {
        loadCats(); // categories for the grid — items themselves load per page on demand
        initGPT();
      });
    </script>
</body>
