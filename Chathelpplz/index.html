<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline UI</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: white;

        /* BAGGRUND */
        background: url("1.jpg") no-repeat center center/cover;
    }

    /* DARK OVERLAY */
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: -1;
    }

    .container {
        max-width: 900px;
        margin: 50px auto;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }

    h1 {
        text-align: center;
        margin-bottom: 40px;
    }

    .timeline {
        position: relative;
        margin-left: 20px;
    }

    .timeline::before {
        content: "";
        position: absolute;
        left: 10px;
        width: 3px;
        height: 100%;
        background: rgba(255,255,255,0.2);
    }

    .event {
        position: relative;
        margin-bottom: 40px;
        padding-left: 40px;

        opacity: 0;
        transform: translateY(20px);
        transition: 0.6s;
    }

    .event.show {
        opacity: 1;
        transform: translateY(0);
    }

    .event::before {
        content: "";
        position: absolute;
        left: 0;
        top: 5px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #ff6b3d;
        box-shadow: 0 0 10px #ff6b3d;
    }

    .card {
        background: rgba(255,255,255,0.07);
        padding: 20px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        transition: 0.3s;
        cursor: pointer;
    }

    .card:hover {
        background: rgba(255,255,255,0.12);
        transform: translateY(-5px);
    }

    .date {
        color: #ff6b3d;
        font-size: 14px;
    }

    .title {
        font-size: 20px;
        font-weight: bold;
    }

    .thumbnail {
        margin-top: 10px;
        border-radius: 10px;
        width: 100%;
    }

    /* MODAL */
    .modal {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.8);
        display: none;
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: rgba(255,255,255,0.1);
        padding: 20px;
        border-radius: 15px;
        backdrop-filter: blur(15px);
        max-width: 700px;
        width: 90%;
    }

    iframe {
        width: 100%;
        height: 400px;
        border-radius: 10px;
    }

    .close {
        float: right;
        cursor: pointer;
        font-size: 20px;
    }

</style>
</head>

<body>

<div class="container">
    <h1>Verdensrekorder Timeline</h1>

    <div class="timeline">

        <!-- EVENT -->
        <div class="event" data-video="dQw4w9WgXcQ">
            <div class="card">
                <div class="date">2023</div>
                <div class="title">Vild verdensrekord 🔥</div>
                <img class="thumbnail" src="https://img.youtube.com/vi/dQw4w9WgXcQ/hqdefault.jpg">
            </div>
        </div>

        <div class="event" data-video="3JZ_D3ELwOQ">
            <div class="card">
                <div class="date">2024</div>
                <div class="title">Ny rekord sat</div>
                <img class="thumbnail" src="https://img.youtube.com/vi/3JZ_D3ELwOQ/hqdefault.jpg">
            </div>
        </div>

    </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">✖</span>
        <iframe id="videoFrame" src="" allowfullscreen></iframe>
    </div>
</div>

<script>
    // SCROLL ANIMATION
    const events = document.querySelectorAll(".event");

    window.addEventListener("scroll", () => {
        events.forEach(e => {
            const top = e.getBoundingClientRect().top;
            if(top < window.innerHeight - 50){
                e.classList.add("show");
            }
        });
    });

    // MODAL VIDEO
    const modal = document.getElementById("modal");
    const frame = document.getElementById("videoFrame");

    document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", () => {
            const videoId = card.parentElement.dataset.video;
            frame.src = `https://www.youtube.com/embed/${videoId}`;
            modal.style.display = "flex";
        });
    });

    function closeModal(){
        modal.style.display = "none";
        frame.src = "";
    }
</script>

</body>
</html>
