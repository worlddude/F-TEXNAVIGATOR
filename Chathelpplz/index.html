<body>
  <aside class="controls" aria-label="Timeline zoom mode switch">
    <button class="mode-btn" data-mode="0" type="button">Media</button>
    <button class="mode-btn" data-mode="1" type="button">Titles</button>
    <button class="mode-btn active" data-mode="2" type="button">Dense</button>
  </aside>





  <main class="page">
    <header class="header">
      
      <h1>
        <img src="NYNEWADADDYLOGO.png" alt="News Daddy Logo" class="logo">
        <span class="line2">Record-breaking News</span>
      </h1>
      <p></p>
    </header>





    
    <div id="recordCount" class="record-count">
      Loading count...
    </div>

    <section class="timeline" id="timeline">
      <div class="empty">Loading timeline...</div>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://lpcygniycyffeswzrnms.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxwY3lnbml5Y3lmZmVzd3pybm1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwODA5NDIsImV4cCI6MjA3MjY1Njk0Mn0.4bVTsLEwvjyPllLU1-U2vcw3yHkzqj69TZOfuJvSvDQ"
    );

    let data = [];

    const MODES = {
      0: { name: "media", scale: 1.08 },
      1: { name: "title", scale: 0.78 },
      2: { name: "dense", scale: 0.48 }
    };

    let currentMode = 0;
    let currentScale = MODES[0].scale;
    let targetScale = MODES[0].scale;

    function getYouTubeId(url) {
      try {
        const parsed = new URL(url);
        const host = parsed.hostname.replace(/^www\./, "");

        if (host === "youtu.be") {
          return parsed.pathname.split("/").filter(Boolean)[0] || null;
        }

        if (host.includes("youtube.com")) {
          if (parsed.pathname === "/watch") return parsed.searchParams.get("v");
          if (parsed.pathname.startsWith("/shorts/")) return parsed.pathname.split("/")[2] || null;
          if (parsed.pathname.startsWith("/embed/")) return parsed.pathname.split("/")[2] || null;
        }
      } catch (err) {
        return null;
      }

      return null;
    }

    function getYouTubeThumbnail(url) {
      const id = getYouTubeId(url);
      if (!id) return "https://via.placeholder.com/1280x720?text=Video+Thumbnail";
      return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
    }

    function createStat(text) {
      const span = document.createElement("span");
      span.className = "stat";
      span.textContent = text;
      return span;
    }

    function setMode(modeIndex) {
      const mode = MODES[modeIndex] || MODES[0];
      currentMode = Number(modeIndex);

      document.body.classList.remove("mode-media", "mode-title", "mode-dense");
      document.body.classList.add(`mode-${mode.name}`);

      document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.classList.toggle("active", Number(btn.dataset.mode) === currentMode);
      });

      targetScale = mode.scale;
    }

    async function loadTimeline() {
      const { data: rows, error } = await supabase
        .from("timeline_items")
        .select("*")
        .order("sort_order", { ascending: true });

      if (error) {
        console.error(error);
        document.getElementById("timeline").innerHTML = `<div class="empty">Failed to load timeline.</div>`;
        return;
      }

      if (rows && rows.length > 0) {
        document.getElementById("recordCount").textContent = `Total records: ${rows.length}`;
      } else {
        document.getElementById("recordCount").textContent = "No records";
      }

      data = (rows || []).map(row => ({
        date: row.date_text || "",
        title: row.title || "",
        desc: row.description || "",
        videoUrl: row.video_url || "",
        views: row.views,
        likes: row.likes
      }));

      buildTimeline();
    }

    function buildTimeline() {
      const timeline = document.getElementById("timeline");
      timeline.innerHTML = "";

      data.forEach(item => {
        const event = document.createElement("article");
        event.className = "event";

        const toggle = document.createElement("button");
        toggle.className = "event-toggle";
        toggle.type = "button";
        toggle.setAttribute("aria-expanded", "false");

        const date = document.createElement("div");
        date.className = "date";
        date.textContent = item.date;

        const title = document.createElement("h2");
        title.className = "title";
        title.textContent = item.title;

        toggle.appendChild(date);
        toggle.appendChild(title);

        const details = document.createElement("div");
        details.className = "details";

        const desc = document.createElement("p");
        desc.className = "desc";
        desc.textContent = item.desc;

        const stats = document.createElement("div");
        stats.className = "stats";

        if (item.views !== undefined && item.views !== null && item.views !== "") {
          stats.appendChild(createStat(`Views ${item.views}`));
        }

        if (item.likes !== undefined && item.likes !== null && item.likes !== "") {
          stats.appendChild(createStat(`Likes ${item.likes}`));
        }

        details.appendChild(desc);
        if (stats.children.length > 0) details.appendChild(stats);

        const mediaLink = document.createElement("a");
        mediaLink.className = "media-link";
        mediaLink.href = item.videoUrl || "#";
        mediaLink.target = "_blank";
        mediaLink.rel = "noopener noreferrer";

        if (!item.videoUrl) {
          mediaLink.style.pointerEvents = "none";
          mediaLink.style.opacity = "0.6";
        }

        const card = document.createElement("div");
        card.className = "card";

        const thumbWrap = document.createElement("div");
        thumbWrap.className = "thumb-wrap";

        const img = document.createElement("img");
        img.loading = "lazy";
        img.src = item.videoUrl ? getYouTubeThumbnail(item.videoUrl) : "https://via.placeholder.com/1280x720?text=No+Video";
        img.alt = item.title;

        const playBadge = document.createElement("div");
        playBadge.className = "play-badge";

        const meta = document.createElement("div");
        meta.className = "meta";

        const metaRow = document.createElement("div");
        metaRow.className = "meta-row";
        metaRow.textContent = "";

        thumbWrap.appendChild(img);
        thumbWrap.appendChild(playBadge);
        card.appendChild(thumbWrap);
        card.appendChild(meta);
        meta.appendChild(metaRow);
        mediaLink.appendChild(card);

        toggle.addEventListener("click", () => {
          const modeName = MODES[currentMode].name;

          if (modeName === "title" || modeName === "dense") {
            const expanded = event.classList.toggle("expanded");
            toggle.setAttribute("aria-expanded", String(expanded));
          }
        });

        event.appendChild(toggle);
        event.appendChild(details);
        event.appendChild(mediaLink);
        timeline.appendChild(event);
      });

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add("show");
        });
      }, { threshold: 0.15 });

      document.querySelectorAll(".event").forEach(el => observer.observe(el));
    }

    document.querySelectorAll(".mode-btn").forEach(btn => {
      btn.addEventListener("click", () => setMode(btn.dataset.mode));
    });

    function animateScale() {
      const speed = 0.08;
      currentScale += (targetScale - currentScale) * speed;

      const timeline = document.getElementById("timeline");
      timeline.style.setProperty("--timeline-scale", currentScale.toFixed(3));

      requestAnimationFrame(animateScale);
    }

    setMode(2);
    animateScale();
    loadTimeline();
  </script>
