<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline UI</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(120deg, #1a1a1a, #2b2b2b);
        color: white;
    }

    /* GLASS CONTAINER */
    .container {
        max-width: 900px;
        margin: 50px auto;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }

    h1 {
        text-align: center;
        margin-bottom: 40px;
    }

    /* TIMELINE LINE */
    .timeline {
        position: relative;
        margin-left: 20px;
    }

    .timeline::before {
        content: "";
        position: absolute;
        left: 10px;
        top: 0;
        width: 3px;
        height: 100%;
        background: rgba(255,255,255,0.2);
    }

    /* EVENT */
    .event {
        position: relative;
        margin-bottom: 40px;
        padding-left: 40px;
    }

    .event::before {
        content: "";
        position: absolute;
        left: 0;
        top: 5px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #ff6b3d;
        box-shadow: 0 0 10px #ff6b3d;
    }

    .card {
        background: rgba(255,255,255,0.07);
        padding: 20px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        transition: 0.3s;
    }

    .card:hover {
        background: rgba(255,255,255,0.12);
        transform: translateY(-5px);
    }

    .date {
        color: #ff6b3d;
        font-size: 14px;
        margin-bottom: 5px;
    }

    .title {
        font-size: 20px;
        font-weight: bold;
    }

    .desc {
        font-size: 14px;
        opacity: 0.8;
        margin-top: 10px;
    }

</style>
</head>

<body>

<div class="container">
    <h1>Min Timeline</h1>

    <div class="timeline">

        <div class="event">
            <div class="card">
                <div class="date">2022</div>
                <div class="title">Startede projekt</div>
                <div class="desc">Begyndte at lære webudvikling og design.</div>
            </div>
        </div>

        <div class="event">
            <div class="card">
                <div class="date">2023</div>
                <div class="title">Første website</div>
                <div class="desc">Lavede min første rigtige hjemmeside.</div>
            </div>
        </div>

        <div class="event">
            <div class="card">
                <div class="date">2024</div>
                <div class="title">UI Design</div>
                <div class="desc">Begyndte at fokusere på moderne UI designs.</div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
