<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Records</title>
  <style>
    :root {
      --bg-overlay: rgba(0, 0, 0, 0.72);
      --panel: rgba(255, 255, 255, 0.06);
      --panel-strong: rgba(255, 255, 255, 0.09);
      --text: #f5f5f5;
      --muted: rgba(255, 255, 255, 0.78);
      --faint: rgba(255, 255, 255, 0.18);
      --accent: #ff8a5b;
      --accent-2: #ff6433;
      --line: rgba(255, 255, 255, 0.12);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.4);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: url("1.jpg") center/cover no-repeat fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 30%),
        var(--bg-overlay);
      z-index: -1;
    }

    .page {
      width: min(1080px, calc(100% - 32px));
      margin: 40px auto;
      padding: 34px 26px 30px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.035));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .header {
      text-align: center;
      margin-bottom: 26px;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      text-shadow: 0 8px 30px rgba(0,0,0,0.45);
    }

    .header p {
      margin: 10px auto 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .timeline {
      position: relative;
      padding-left: 42px;
      margin-top: 22px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 10px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, rgba(255,138,91,0.85), rgba(255,255,255,0.28));
      border-radius: 999px;
    }

    .event {
      position: relative;
      padding-bottom: 30px;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--line);
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .event:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .event.show {
      opacity: 1;
      transform: translateY(0);
    }

    .event::before {
      content: "";
      position: absolute;
      left: -34px;
      top: 16px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(255, 138, 91, 0.16), 0 0 22px rgba(255, 138, 91, 0.25);
    }

    .date {
      display: inline-block;
      color: var(--accent);
      font-size: 1.45rem;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .title {
      font-size: clamp(1.45rem, 2.8vw, 2.25rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      margin: 0 0 10px;
      line-height: 1.08;
      text-transform: uppercase;
    }

    .desc {
      margin: 0 0 16px;
      max-width: 820px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 16px;
    }

    .video-link {
      display: block;
      text-decoration: none;
      color: inherit;
      width: min(100%, 760px);
    }

    .card {
      border-radius: 18px;
      overflow: hidden;
      background: rgba(20, 20, 20, 0.62);
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
      transform: translateZ(0);
    }

    .thumb-wrap {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }

    .video-link:hover .thumb-wrap img {
      transform: scale(1.03);
    }

    .play-badge {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 78px;
      height: 54px;
      border-radius: 16px;
      background: linear-gradient(180deg, #ff7a45, #d94d24);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.18);
      pointer-events: none;
    }

    .play-badge::before {
      content: "";
      display: block;
      margin-left: 4px;
      width: 0;
      height: 0;
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      border-left: 18px solid #fff;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
    }

    .meta {
      padding: 14px 16px 15px;
      display: grid;
      gap: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.16));
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      line-height: 1.4;
    }

    .stat {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap;
    }

    .stat::before {
      content: "";
      width: 10px;
      height: 10px;
      display: inline-block;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,138,91,0.18);
      flex: 0 0 10px;
    }

    .empty {
      padding: 18px 0;
      color: rgba(255,255,255,0.72);
      font-size: 15px;
    }

    @media (max-width: 800px) {
      .page {
        margin: 16px auto;
        padding: 22px 16px 20px;
      }

      .timeline {
        padding-left: 34px;
      }

      .event::before {
        left: -30px;
      }

      .video-link {
        width: 100%;
      }

      .desc {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>World Records</h1>
      <p>A clean timeline layout for your videos. Add your own views and likes manually, while the thumbnail is pulled automatically from the video link.</p>
    </header>

    <section class="timeline" id="timeline">
      <div class="empty">Loading timeline...</div>
    </section>
  </main>

  <script>
    // Add your items here.
    // videoUrl can be a normal YouTube link, youtu.be link, shorts link, or embed link.
    const data = [
      {
        date: "August 5, 2021",
        title: "JONAS VINGEGAARD WINS OLYMPICS",
        desc: "Jonas Vingegaard achieves Olympic glory, breaking all expectations and making history.",
        videoUrl: "https://www.youtube.com/watch?v=l4hT0LWsujk",
        views: "2.3M views",
        likes: "45K likes"
      },
      {
        date: "May 12, 2020",
        title: "NEW WORLD RECORD",
        desc: "A new record is set and astonishes the entire world.",
        videoUrl: "https://www.youtube.com/watch?v=YJb2Wx-p92o",
        views: "1.1M views",
        likes: "18K likes"
      }
    ];

    function getYouTubeId(url) {
      try {
        const parsed = new URL(url);
        const host = parsed.hostname.replace(/^www\./, "");

        if (host === "youtu.be") {
          return parsed.pathname.split("/").filter(Boolean)[0] || null;
        }

        if (host.includes("youtube.com")) {
          if (parsed.pathname === "/watch") {
            return parsed.searchParams.get("v");
          }

          if (parsed.pathname.startsWith("/shorts/")) {
            return parsed.pathname.split("/")[2] || null;
          }

          if (parsed.pathname.startsWith("/embed/")) {
            return parsed.pathname.split("/")[2] || null;
          }
        }
      } catch (err) {
        return null;
      }

      return null;
    }

    function getYouTubeThumbnail(url) {
      const id = getYouTubeId(url);
      if (!id) return "https://via.placeholder.com/1280x720?text=Video+Thumbnail";
      return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
    }

    function openInNewTab(url) {
      window.open(url, "_blank", "noopener,noreferrer");
    }

    function createStat(text) {
      const span = document.createElement("span");
      span.className = "stat";
      span.textContent = text;
      return span;
    }

    function buildTimeline() {
      const timeline = document.getElementById("timeline");
      timeline.innerHTML = "";

      data.forEach(item => {
        const event = document.createElement("article");
        event.className = "event";

        const date = document.createElement("div");
        date.className = "date";
        date.textContent = item.date;

        const title = document.createElement("h2");
        title.className = "title";
        title.textContent = item.title;

        const desc = document.createElement("p");
        desc.className = "desc";
        desc.textContent = item.desc;

        const link = document.createElement("a");
        link.className = "video-link";
        link.href = item.videoUrl;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.setAttribute("aria-label", `Open video: ${item.title}`);

        const card = document.createElement("div");
        card.className = "card";

        const thumbWrap = document.createElement("div");
        thumbWrap.className = "thumb-wrap";

        const img = document.createElement("img");
        img.loading = "lazy";
        img.src = getYouTubeThumbnail(item.videoUrl);
        img.alt = item.title;

        const playBadge = document.createElement("div");
        playBadge.className = "play-badge";

        const meta = document.createElement("div");
        meta.className = "meta";

        const metaRow = document.createElement("div");
        metaRow.className = "meta-row";
        metaRow.appendChild(createStat(item.views || "Add views"));
        metaRow.appendChild(createStat(item.likes || "Add likes"));

        thumbWrap.appendChild(img);
        thumbWrap.appendChild(playBadge);
        meta.appendChild(metaRow);
        card.appendChild(thumbWrap);
        card.appendChild(meta);
        link.appendChild(card);

        event.appendChild(date);
        event.appendChild(title);
        event.appendChild(desc);
        event.appendChild(link);
        timeline.appendChild(event);
      });

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add("show");
        });
      }, { threshold: 0.15 });

      document.querySelectorAll(".event").forEach(el => observer.observe(el));
    }

    buildTimeline();
  </script>
</body>
</html>
