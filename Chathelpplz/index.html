<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Records</title>
  <style>
    :root {
      --bg-overlay: rgba(0, 0, 0, 0.72);
      --panel: rgba(255, 255, 255, 0.06);
      --panel-strong: rgba(255, 255, 255, 0.09);
      --text: #f5f5f5;
      --muted: rgba(255, 255, 255, 0.78);
      --faint: rgba(255, 255, 255, 0.18);
      --accent: rgb(247, 50, 43);
      --accent-2: #ff6433;
      --line: rgba(255, 255, 255, 0.12);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.4);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: url("1.jpg") center/cover no-repeat fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 30%),
        var(--bg-overlay);
      z-index: -1;
    }

    .page {
      width: min(1080px, calc(100% - 32px));
      margin: 40px auto;
      padding: 34px 26px 30px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.035));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .header {
      text-align: center;
      margin-bottom: 26px;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      text-shadow: 0 8px 30px rgba(0,0,0,0.45);
    }

    .header p {
      margin: 10px auto 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .controls {
      position: fixed;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 18px;
      background: rgba(255,0 , 0, 0.33);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .controls .label {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-size: 20px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.75);
      user-select: none;
    }

    .slider-wrap {
      width: 34px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slider-wrap input[type="range"] {
      width: 220px;
      transform: rotate(-90deg);
      cursor: pointer;
    }

    .timeline {
      position: relative;
      padding-left: 42px;
      margin-top: 22px;
      --timeline-scale: 1;
      --thumb-opacity: 1;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 11px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgb(253, 88, 94);
      border-radius: 999px;
      box-shadow: 0 0 14px rgba(253, 88, 94, 0.35);
    }

    .event {
      position: relative;
      padding-bottom: calc(30px * var(--timeline-scale));
      margin-bottom: calc(30px * var(--timeline-scale));
      border-bottom: 1px solid var(--line);
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.55s ease, transform 0.55s ease;
      text-align: left;
    }

    .event:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .event.show {
      opacity: 1;
      transform: translateY(0);
    }

    .event::before {
      content: "";
      position: absolute;
      left: -40px;
      top: 16px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(255, 138, 91, 0.16), 0 0 22px rgba(255, 138, 91, 0.28);
    }

    .date {
      display: block;
      color: var(--accent);
      font-size: 1.45rem;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .title {
      font-size: clamp(1.45rem, 2.8vw, 2.25rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      margin: 0 0 10px;
      line-height: 1.08;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }



    
    .text-box {
    display: inline-block;
    padding: 12px 14px;
    border-radius: 14px;
    transition: background 0.2s ease, box-shadow 0.2s ease;
  }
    .zoomed-out .text-box:hover {
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
  }




    
    
    .desc {
      margin: 0 0 16px;
      max-width: 820px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 16px;
      text-align: left;
    }

    .video-link {
      display: block;
      text-decoration: none;
      color: inherit;
      width: min(100%, 760px);
      margin: 0;
      overflow: hidden;
      max-height: calc(1000px * var(--thumb-opacity));
      opacity: var(--thumb-opacity);
      transition: opacity 0.2s ease, max-height 0.2s ease;
    }

    .card {
      border-radius: 18px;
      overflow: hidden;
      background: rgba(20, 20, 20, 0.62);
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
      transform: translateZ(0);
    }

    .thumb-wrap {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }

    .video-link:hover .thumb-wrap img {
      transform: scale(1.03);
    }

    .play-badge {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 78px;
      height: 54px;
      border-radius: 16px;
      background: linear-gradient(180deg, #ff7a45, #d94d24);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.18);
      pointer-events: none;
    }

    .play-badge::before {
      content: "";
      display: block;
      margin-left: 4px;
      width: 0;
      height: 0;
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      border-left: 18px solid #fff;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
    }

    .meta {
      padding: 14px 16px 15px;
      display: grid;
      gap: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.16));
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      line-height: 1.4;
    }

    .stat {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap;
    }

    .stat::before {
      content: "";
      width: 10px;
      height: 10px;
      display: inline-block;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,138,91,0.18);
      flex: 0 0 10px;
    }

    .zoomed-out .video-link {
      display: none;
    }

    .inline-video {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s ease;
      opacity: 0;
      margin-top: 12px;
    }

    .inline-video.open {
      max-height: 500px;
      opacity: 1;
    }

    .inline-video iframe {
      width: 100%;
      aspect-ratio: 16/9;
      border: none;
      border-radius: 12px;
    }

    .empty {
      padding: 18px 0;
      color: rgba(255,255,255,0.72);
      font-size: 15px;
    }

    @media (max-width: 800px) {
      .page {
        margin: 16px auto;
        padding: 22px 16px 20px;
      }

      .timeline {
        padding-left: 34px;
      }

      .event::before {
        left: -30px;
      }

      .video-link {
        width: 100%;
      }

      .desc {
        font-size: 15px;
      }
    }
  </style>
</head>


      
<body>

  <aside class="controls" aria-label="Timeline size control">
    <div class="label">Timeline size</div>
    <div class="slider-wrap">
      <input id="timelineSlider" type="range" min="0.4" max="1.15" step="0.01" value="1">
    </div>
  </aside>

  <main class="page">

  <header class="header">
    <h1>News Daddy World Records</h1>
    <p>Your timeline of record-breaking moments</p>
  </header>

  <section class="timeline" id="timeline">


      
      <div class="empty">Loading timeline...</div>
    </section>
  </main>

<script>

  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const supabase = createClient(
  "https://F-TEXNAVIGATOR_2.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxwY3lnbml5Y3lmZmVzd3pybm1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwODA5NDIsImV4cCI6MjA3MjY1Njk0Mn0.4bVTsLEwvjyPllLU1-U2vcw3yHkzqj69TZOfuJvSvDQ"
  );
  
  // Add your items here.
  // videoUrl can be a normal YouTube link, youtu.be link, shorts link, or embed link.
  const data = [];

  function getYouTubeId(url) {
    try {
      const parsed = new URL(url);
      const host = parsed.hostname.replace(/^www\./, "");

      if (host === "youtu.be") {
        return parsed.pathname.split("/").filter(Boolean)[0] || null;
      }

      if (host.includes("youtube.com")) {
        if (parsed.pathname === "/watch") {
          return parsed.searchParams.get("v");
        }

        if (parsed.pathname.startsWith("/shorts/")) {
          return parsed.pathname.split("/")[2] || null;
        }

        if (parsed.pathname.startsWith("/embed/")) {
          return parsed.pathname.split("/")[2] || null;
        }
      }
    } catch (err) {
      return null;
    }

    return null;
  }

  async function loadTimeline() {
  const { data: rows, error } = await supabase
    .from("timeline_items")
    .select("*")
    .order("sort_order", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  // map database → your existing format
  data = rows.map(row => ({
    date: row.date_text,
    title: row.title,
    desc: row.description,
    videoUrl: row.video_url,
    views: row.views,
    likes: row.likes
  }));

  buildTimeline(); // 🔥 this keeps everything working
}

  function getYouTubeThumbnail(url) {
    const id = getYouTubeId(url);
    if (!id) return "https://via.placeholder.com/1280x720?text=Video+Thumbnail";
    return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
  }

  function createStat(text) {
    const span = document.createElement("span");
    span.className = "stat";
    span.textContent = text;
    return span;
  }

  const timelineSlider = document.getElementById("timelineSlider");

  let currentScale = 1;
  let targetScale = 1;

  function updateTimelineScale(value) {
    targetScale = Number(value);
  }

  function animateScale() {
    const speed = 0.08;

    currentScale += (targetScale - currentScale) * speed;

    const timeline = document.getElementById("timeline");
    const thumbOpacity = Math.max(0, Math.min(1, (currentScale - 0.45) / 0.25));

    timeline.style.setProperty("--timeline-scale", currentScale);
    timeline.style.setProperty("--thumb-opacity", thumbOpacity);

    if (currentScale <= 0.45) {
      document.body.classList.add("zoomed-out");
    } else {
      document.body.classList.remove("zoomed-out");
    }

    requestAnimationFrame(animateScale);
  }

  function buildTimeline() {
    const timeline = document.getElementById("timeline");
    timeline.innerHTML = "";

    data.forEach(item => {
      const event = document.createElement("article");
      event.className = "event";

      const date = document.createElement("div");
      date.className = "date";
      date.textContent = item.date;

      const title = document.createElement("h2");
      title.className = "title";
      title.textContent = item.title;

      const desc = document.createElement("p");
      desc.className = "desc";
      desc.textContent = item.desc;

      const textBox = document.createElement("div");
      textBox.className = "text-box";

      const inlineVideo = document.createElement("div");
      inlineVideo.className = "inline-video";

      const iframe = document.createElement("iframe");
      iframe.src = "";
      inlineVideo.appendChild(iframe);

      title.addEventListener("click", () => {
        const scale = Number(
          getComputedStyle(document.getElementById("timeline")).getPropertyValue("--timeline-scale")
        );

        if (scale <= 0.41) {
          if (!inlineVideo.classList.contains("open")) {
            const id = getYouTubeId(item.videoUrl);
            iframe.src = `https://www.youtube.com/embed/${id}`;
            inlineVideo.classList.add("open");
          } else {
            inlineVideo.classList.remove("open");
            iframe.src = "";
          }
        }
      });

      const link = document.createElement("a");
      link.className = "video-link";
      link.href = item.videoUrl;
      link.target = "_blank";
      link.rel = "noopener noreferrer";

      const card = document.createElement("div");
      card.className = "card";

      const thumbWrap = document.createElement("div");
      thumbWrap.className = "thumb-wrap";

      const img = document.createElement("img");
      img.loading = "lazy";
      img.src = getYouTubeThumbnail(item.videoUrl);
      img.alt = item.title;

      const playBadge = document.createElement("div");
      playBadge.className = "play-badge";

      const meta = document.createElement("div");
      meta.className = "meta";

      const metaRow = document.createElement("div");
      metaRow.className = "meta-row";

      // optional if you want to show them again later:
      // metaRow.appendChild(createStat(item.views || "Add views"));
      // metaRow.appendChild(createStat(item.likes || "Add likes"));

      thumbWrap.appendChild(img);
      thumbWrap.appendChild(playBadge);
      card.appendChild(thumbWrap);
      card.appendChild(meta);
      link.appendChild(card);

      textBox.appendChild(date);
      textBox.appendChild(title);
      textBox.appendChild(desc);

      event.appendChild(textBox);
      event.appendChild(link);
      event.appendChild(inlineVideo);
      timeline.appendChild(event);
    });

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add("show");
      });
    }, { threshold: 0.15 });

    document.querySelectorAll(".event").forEach(el => observer.observe(el));
  }

  if (timelineSlider) {
    timelineSlider.addEventListener("input", () => {
      updateTimelineScale(timelineSlider.value);
    });

    updateTimelineScale(timelineSlider.value);
  }

  animateScale();
  loadTimeline();
</script>
</body>
</html>
