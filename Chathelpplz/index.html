<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Timeline</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: url("1.jpg") center/cover no-repeat fixed;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    z-index: -1;
  }

  .container {
    max-width: 850px;
    margin: 50px auto;
    padding: 30px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 20px;
  }

  .timeline {
    position: relative;
    padding-left: 35px;
  }

  .timeline::before {
    content: "";
    position: absolute;
    left: 8px;
    top: 0;
    width: 3px;
    height: 100%;
    background: rgba(255,255,255,0.2);
  }

  .event {
    position: relative;
    margin-bottom: 42px;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.5s;
  }

  .event.show {
    opacity: 1;
    transform: translateY(0);
  }

  .marker-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }

  .dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #ff6b3d;
    box-shadow: 0 0 0 6px rgba(255,107,61,0.14);
    flex: 0 0 16px;
  }

  .date {
    font-size: 16px;
    color: #ff6b3d;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .content {
    margin-left: 30px;
  }

  .title {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 10px;
    line-height: 1.15;
  }

  .desc {
    font-size: 16px;
    line-height: 1.7;
    opacity: 0.88;
  }

  .video {
    margin-top: 16px;
    cursor: pointer;
  }

  .video-thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
  }

  .video-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .video-info {
    margin-top: 8px;
    font-size: 13px;
    color: rgba(255,255,255,0.8);
  }

  .video-title {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 3px;
  }

  .video-views {
    opacity: 0.7;
  }

  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    display: none;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .modal.open {
    display: flex;
  }

  .modal iframe {
    width: min(900px, 95vw);
    aspect-ratio: 16 / 9;
    border: 0;
    border-radius: 14px;
    background: black;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Verdensrekorder</h1>
  <div class="timeline" id="timeline"></div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
  <iframe id="frame" src="" allowfullscreen></iframe>
</div>

<script>
  const API_KEY = "DIN_YOUTUBE_API_KEY_HER";

  const data = [
    {
      title: "JONAS VINGEGAARD VINDER OL",
      desc: "Jonas vierf bla bla bla bl a bla bla bl vls bls sdækf dæsfkdsfdskfædsk fdæsf kdæfldkfældskfæsd fkædl kdælfk dsælfks dælfsdk fæsdk fæsldfk dæfkdælfsdkæf",
      video: "l4hT0LWsujk",
      videoTitle: "Jonas vinder OL",
      views: "2.3M views"
    },
    {
      title: "NY VERDENSREKORD",
      desc: "En ny rekord bliver sat og overrasker hele verden.",
      video: "YJb2Wx-p92o",
      videoTitle: "Ny rekord sat!",
      views: "1.1M views"
    }
  ];

  async function fetchUploadDate(videoId) {
    try {
      const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videoId}&key=${API_KEY}`;
      const res = await fetch(url);
      const json = await res.json();
      const publishedAt = json.items?.[0]?.snippet?.publishedAt;
      if (!publishedAt) return { raw: null, formatted: "Ukendt dato" };

      const date = new Date(publishedAt);
      const formatted = new Intl.DateTimeFormat("da-DK", {
        day: "numeric",
        month: "long",
        year: "numeric"
      }).format(date);

      return { raw: publishedAt, formatted };
    } catch (err) {
      return { raw: null, formatted: "Ukendt dato" };
    }
  }

  async function buildTimeline() {
    const enriched = await Promise.all(
      data.map(async item => {
        const uploadDate = await fetchUploadDate(item.video);
        return { ...item, uploadDate };
      })
    );

    // nyeste øverst
    enriched.sort((a, b) => {
      const da = a.uploadDate.raw ? new Date(a.uploadDate.raw).getTime() : 0;
      const db = b.uploadDate.raw ? new Date(b.uploadDate.raw).getTime() : 0;
      return db - da;
    });

    const timeline = document.getElementById("timeline");
    timeline.innerHTML = "";

    enriched.forEach(item => {
      const el = document.createElement("div");
      el.className = "event";
      el.innerHTML = `
        <div class="marker-row">
          <div class="dot"></div>
          <div class="date">${item.uploadDate.formatted}</div>
        </div>

        <div class="content">
          <div class="title">${item.title}</div>
          <div class="desc">${item.desc}</div>

          <div class="video" onclick="openVideo('${item.video}')">
            <div class="video-thumb">
              <img src="https://img.youtube.com/vi/${item.video}/hqdefault.jpg" alt="${item.videoTitle}">
            </div>
            <div class="video-info">
              <div class="video-title">${item.videoTitle}</div>
              <div class="video-views">${item.views}</div>
            </div>
          </div>
        </div>
      `;
      timeline.appendChild(el);
    });

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add("show");
      });
    }, { threshold: 0.15 });

    document.querySelectorAll(".event").forEach(e => observer.observe(e));
  }

  function openVideo(id) {
    document.getElementById("modal").classList.add("open");
    document.getElementById("frame").src = `https://www.youtube.com/embed/${id}`;
  }

  function closeModal() {
    document.getElementById("modal").classList.remove("open");
    document.getElementById("frame").src = "";
  }

  buildTimeline();
</script>
</body>
</html>
