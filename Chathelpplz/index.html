<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: url("1.jpg") center/cover no-repeat;
}

/* overlay */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: -1;
}

.container {
    max-width: 800px;
    margin: 50px auto;
    padding: 30px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 20px;
}

/* timeline line */
.timeline {
    position: relative;
    padding-left: 30px;
}

.timeline::before {
    content: "";
    position: absolute;
    left: 8px;
    top: 0;
    width: 3px;
    height: 100%;
    background: rgba(255,255,255,0.2);
}

/* event */
.event {
    position: relative;
    margin-bottom: 40px;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.5s;
}

.event.show {
    opacity: 1;
    transform: translateY(0);
}

/* dot */
.dot {
    position: absolute;
    left: -2px;
    top: 5px;
    width: 16px;
    height: 16px;
    background: #ff6b3d;
    border-radius: 50%;
}

/* date next to dot */
.date {
    margin-left: 25px;
    font-size: 16px;
    color: #ff6b3d;
    margin-bottom: 10px;
}

/* content */
.content {
    margin-left: 25px;
}

.title {
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 10px;
}

.desc {
    font-size: 16px;
    opacity: 0.85;
    line-height: 1.6;
}

/* video */
.video {
    margin-top: 15px;
    cursor: pointer;
}

.video img {
    width: 100%;
    border-radius: 10px;
}

/* modal */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
}

iframe {
    width: 90%;
    max-width: 800px;
    height: 450px;
}

</style>
</head>

<body>

<div class="container">
    <h1>Verdensrekorder</h1>

    <div class="timeline" id="timeline"></div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
    <iframe id="frame" src=""></iframe>
</div>

<script>

const data = [
{
    date: "1 April 2026",
    title: "JONAS VINGEGAARD VINDER OL",
    desc: "Jonas vinder en vild rekord og slår alle konkurrenter. Dette er en af de største præstationer nogensinde.",
    video: "dQw4w9WgXcQ"
},
{
    date: "12 Marts 2025",
    title: "NY VERDENSREKORD",
    desc: "En ny rekord bliver sat og overrasker hele verden.",
    video: "3JZ_D3ELwOQ"
}
];

// nyeste øverst (kan også sorteres automatisk senere)
data.reverse();

const timeline = document.getElementById("timeline");

data.forEach(item => {
    const el = document.createElement("div");
    el.className = "event";

    el.innerHTML = `
        <div class="dot"></div>
        <div class="date">${item.date}</div>

        <div class="content">
            <div class="title">${item.title}</div>
            <div class="desc">${item.desc}</div>

            <div class="video" onclick="openVideo('${item.video}')">
                <img src="https://img.youtube.com/vi/${item.video}/hqdefault.jpg">
            </div>
        </div>
    `;

    timeline.appendChild(el);
});

// scroll animation
const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
        if(e.isIntersecting) e.target.classList.add("show");
    });
});

document.querySelectorAll(".event").forEach(e => observer.observe(e));

// modal
function openVideo(id){
    document.getElementById("modal").style.display = "flex";
    document.getElementById("frame").src = `https://www.youtube.com/embed/${id}`;
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
    document.getElementById("frame").src = "";
}

</script>

</body>
</html>
