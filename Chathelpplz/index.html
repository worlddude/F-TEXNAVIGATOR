<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Locator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Geist+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c0e;
      --bg2: #111114;
      --surface: rgba(255, 255, 255, .045);
      --surface2: rgba(255, 255, 255, .075);
      --border: rgba(255, 255, 255, .09);
      --border2: rgba(255, 255, 255, .15);
      --text: #f0f0f2;
      --muted: rgba(240, 240, 242, .38);
      --accent: #eff1f3;
      --accent-bg: rgba(168, 255, 87, .1);
      --accent-glow: rgba(168, 255, 87, .22);
      --r: 14px;
      --r-sm: 9px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent
    }

    html {
      height: 100%;
      font-family: 'Syne', sans-serif;
      background: #000;
      overflow: hidden
    }

    body {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a1a;
      overflow: hidden
    }

    .phone-shell {
      width: 100%;
      max-width: 430px;
      height: 100%;
      max-height: 900px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, .08), 0 40px 120px rgba(0, 0, 0, .9);
      border-radius: 0;
    }

    @media(min-width:500px) {
      .phone-shell {
        border-radius: 44px;
        max-height: 860px;
      }
    }

    .phone-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: .022;
      pointer-events: none;
      z-index: 9999;
      border-radius: inherit
    }

    /* header */
    .header {
      padding: 13px 13px 0;
      flex-shrink: 0;
      z-index: 10;
      background: var(--bg);
      touch-action: none;
    }

    @media(min-width:500px) {
      .header {
        padding-top: 18px
      }
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 11px
    }

    .wordmark {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .01em;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0
    }

    .wordmark em {
      color: #263454eb;
      font-style: normal
    }

    .search-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center
    }

    .search-icon {
      position: absolute;
      left: 11px;
      color: #fff;
      pointer-events: none;
      display: flex
    }

    .search-wrap input {
      width: 100%;
      height: 38px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 50px;
      padding: 0 14px 0 36px;
      font-size: 13px;
      font-family: 'Syne', sans-serif;
      color: #fff;
      outline: none;
      transition: border-color .18s, box-shadow .18s, background .18s
    }

    .search-wrap input::placeholder {
      color: rgba(255, 255, 255, .5)
    }

    .search-wrap input:focus {
      border-color: #2563eb;
      background: rgba(37, 99, 235, .07);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .22)
    }

    /* tabs */
    .tabs {
      display: flex;
      gap: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 3px;
      margin-bottom: 0
    }

    .tabs button {
      flex: 1;
      background: none;
      border: 0;
      color: #fff;
      padding: 8px 6px;
      font-size: 11.5px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 50px;
      transition: color .15s, background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px
    }

    .tabs button svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0
    }

    .tabs button.active {
      background: #2563eb;
      color: #fff
    }

    /* main */
    .main {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    /* map */
    #mapContainer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      touch-action: none;
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: center
    }

    #map {
      will-change: transform;
      transform-origin: 0 0;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      height: 100%;
      width: auto;
      object-fit: contain
    }

    /* camera */
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      position: absolute;
      inset: 0
    }

    #video.fullscreen {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      object-fit: cover
    }

    /* scan overlay */
    #scanOverlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 11;
      pointer-events: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0
    }

    #scanOverlay.on {
      display: flex
    }

    #scanHint {
      color: rgba(255, 255, 255, .75);
      font-size: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-top: 22px;
      text-align: center;
      text-shadow: 0 1px 8px rgba(0, 0, 0, .8)
    }

    .sf {
      width: 280px;
      height: 180px;
      position: relative
    }

    .sf::before,
    .sf::after,
    .sf span::before,
    .sf span::after {
      content: '';
      position: absolute;
      width: 36px;
      height: 36px;
      border-color: #a8ff57;
      border-style: solid
    }

    .sf::before {
      top: 0;
      left: 0;
      border-width: 3px 0 0 3px;
      border-radius: 5px 0 0 0
    }

    .sf::after {
      top: 0;
      right: 0;
      border-width: 3px 3px 0 0;
      border-radius: 0 5px 0 0
    }

    .sf span::before {
      bottom: 0;
      left: 0;
      border-width: 0 0 3px 3px;
      border-radius: 0 0 0 5px
    }

    .sf span::after {
      bottom: 0;
      right: 0;
      border-width: 0 3px 3px 0;
      border-radius: 0 0 5px 0
    }

    .sf-inner-border {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(168, 255, 87, .15);
      border-radius: 4px
    }

    .sl {
      position: absolute;
      left: 4px;
      right: 4px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #a8ff57, transparent);
      box-shadow: 0 0 18px 2px rgba(168, 255, 87, .7), 0 0 40px rgba(168, 255, 87, .3);
      animation: scan 2s ease-in-out infinite
    }

    @keyframes scan {
      0% {
        top: 6px;
        opacity: 1
      }

      50% {
        top: calc(100% - 6px);
        opacity: .85
      }

      100% {
        top: 6px;
        opacity: 1
      }
    }

    /* torch */
    #torchBtn {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 60;
      background: rgba(12, 12, 14, .75);
      backdrop-filter: blur(14px);
      color: #fff;
      border: 1px solid var(--border2);
      padding: 9px 17px;
      border-radius: 50px;
      font-size: 11px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      display: none;
      cursor: pointer;
      align-items: center;
      gap: 6px;
      transition: all .2s
    }

    #torchBtn.on {
      background: rgba(168, 255, 87, .15);
      border-color: #a8ff57;
      color: #a8ff57;
      box-shadow: 0 0 20px rgba(168, 255, 87, .22)
    }

    /* item card */
    .item-card {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: transparent;
      border-top: none;
      padding: 14px 13px;
      flex-shrink: 0;
      z-index: 20;
      pointer-events: none;
      touch-action: none;
    }

    .item-card.hidden {
      display: none
    }

    .card-row,
    #addForm {
      pointer-events: auto;
      background: rgba(12, 12, 14, 0.6);
      backdrop-filter: blur(20px);
      border-radius: var(--r);
      border: 1px solid var(--border);
      padding: 12px;
    }

    #addForm {
      flex-direction: column;
      gap: 9px;
      margin-top: 8px;
    }

    .card-row {
      display: flex;
      gap: 11px;
      align-items: flex-start
    }

    #itemPhotoDisplay {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border-radius: 9px;
      border: 1px solid var(--border2);
      flex-shrink: 0;
      cursor: zoom-in
    }

    .card-info {
      flex: 1;
      min-width: 0
    }

    .card-info h2 {
      font-size: 14.5px;
      font-weight: 700;
      letter-spacing: -.01em;
      margin-bottom: 7px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #fff
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px
    }

    .chip {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      padding: 3px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: #fff;
      letter-spacing: .02em
    }

    .chip b {
      color: #fff;
      font-weight: 600
    }

    .chip.hi {
      background: rgba(168, 255, 87, .1);
      border-color: rgba(168, 255, 87, .25);
      color: #a8ff57
    }

    /* form */
    #addForm {
      display: none;
    }

    .form-row {
      display: flex;
      gap: 7px
    }

    .fg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1
    }

    .fg label {
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--muted)
    }

    .fg input {
      height: 38px;
      padding: 0 11px;
      font-size: 13px;
      font-family: 'Syne', sans-serif;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--r-sm);
      color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s, background .15s
    }

    .fg input::placeholder {
      color: var(--muted)
    }

    .fg input:focus {
      border-color: #a8ff57;
      background: rgba(168, 255, 87, .04);
      box-shadow: 0 0 0 3px rgba(168, 255, 87, .22)
    }

    .fg input[readonly] {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      cursor: default
    }

    .photo-zone {
      display: flex;
      align-items: center;
      gap: 11px;
      background: var(--surface);
      border: 1px dashed var(--border2);
      border-radius: var(--r-sm);
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color .15s, background .15s
    }

    .photo-zone:hover {
      border-color: #a8ff57;
      background: rgba(168, 255, 87, .03)
    }

    #photoPreview {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border2);
      display: none;
      flex-shrink: 0
    }

    .photo-label {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5
    }

    .photo-label strong {
      color: #a8ff57
    }

    input[type="file"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0
    }

    .btn-save {
      height: 42px;
      border: 0;
      border-radius: var(--r-sm);
      background: #a8ff57;
      color: #0c0c0e;
      font-size: 12.5px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      box-shadow: 0 0 22px rgba(168, 255, 87, .18);
      transition: opacity .15s, transform .1s, box-shadow .15s
    }

    .btn-save:hover {
      box-shadow: 0 0 32px rgba(168, 255, 87, .35)
    }

    .btn-save:active {
      transform: scale(.98);
      opacity: .85
    }

    /* list */
    #listPage {
      flex: 1;
      overflow-y: auto;
      padding: 9px 11px;
      display: none;
      flex-direction: column;
      gap: 5px
    }

    #listPage::-webkit-scrollbar {
      width: 3px
    }

    #listPage::-webkit-scrollbar-track {
      background: transparent
    }

    #listPage::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px
    }

    .list-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 11px;
      display: flex;
      align-items: center;
      gap: 11px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background .12s, border-color .12s;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      flex-shrink: 0
    }

    .list-item:hover {
      background: var(--surface2);
      border-color: var(--border2)
    }

    .list-thumb {
      width: 46px;
      height: 46px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      flex: 0 0 46px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden
    }

    .list-body {
      flex: 1;
      min-width: 0
    }

    .list-body h3 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -.01em;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #fff
    }

    .press-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: rgba(168, 255, 87, .08);
      opacity: 0;
      transition: opacity 120ms linear;
      border-radius: inherit
    }

    .list-arrow {
      color: #fff;
      flex-shrink: 0;
      opacity: .6
    }

    .load-more {
      height: 38px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border2);
      background: transparent;
      color: #a8ff57;
      font-size: 11px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .12s
    }

    .load-more:hover {
      background: rgba(168, 255, 87, .1)
    }

    .empty {
      text-align: center;
      color: #fff;
      padding: 44px 20px;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px
    }

    .empty svg {
      opacity: .35
    }

    /* modal */
    #photoModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, .88);
      backdrop-filter: blur(14px);
      justify-content: center;
      align-items: center;
      animation: fi .15s ease
    }

    @keyframes fi {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    #photoModal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: var(--r);
      box-shadow: 0 32px 80px rgba(0, 0, 0, .7);
      cursor: zoom-out
    }

    /* Category List Styles */
    .cat-section {
      margin-bottom: 24px;
    }

    .cat-header {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #a8ff57;
      margin: 16px 4px 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cat-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(168, 255, 87, 0.2), transparent);
    }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
      gap: 8px;
      margin-bottom: 20px;
    }

    .cat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cat-card:hover {
      background: var(--surface2);
      border-color: #a8ff57;
      transform: translateY(-2px);
    }

    .cat-card span {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
    }

    /* ItemGPT Banner */
    .gpt-banner {
      background: linear-gradient(135deg, rgba(168, 255, 87, 0.1), rgba(37, 99, 235, 0.1));
      border: 1px solid rgba(168, 255, 87, 0.2);
      border-radius: var(--r);
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .gpt-banner:active {
      transform: scale(0.98);
    }

    .gpt-icon {
      width: 36px;
      height: 36px;
      background: #a8ff57;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0c0c0e;
      box-shadow: 0 0 15px rgba(168, 255, 87, 0.4);
    }

    .gpt-text h4 {
      font-size: 13px;
      color: #fff;
      margin-bottom: 2px;
    }

    .gpt-text p {
      font-size: 11px;
      color: var(--muted);
    }

    /* GPT Modal */
    #gptModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(12, 12, 14, 0.9);
      backdrop-filter: blur(20px);
      padding: 20px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #gptModal.on {
      display: flex;
    }

    .gpt-input-wrap {
      width: 100%;
      max-width: 320px;
      text-align: center;
    }

    .gpt-input-wrap input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid #a8ff57;
      color: #fff;
      font-size: 18px;
      font-family: 'Syne', sans-serif;
      padding: 10px 0;
      outline: none;
      text-align: center;
      margin-bottom: 20px;
    }

    .gpt-status {
      font-size: 12px;
      color: #a8ff57;
      height: 1.5em;
    }

    #detectBadge {
      display: none !important
    }

    /* Map Flip Scene */
    .flip-scene {
      perspective: 2000px;
      position: absolute;
      inset: 0;
    }

    .flip-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .flip-card.flipped {
      transform: rotateY(180deg);
    }

    .flip-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
      background: var(--bg2);
      transform: translateZ(0);
      /* Fix mobile flicker */
    }

    .flip-back {
      transform: rotateY(180deg);
      background: #0c0c0e;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #mapWrapper {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      will-change: transform;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #mapWrapper.no-transition {
      transition: none;
    }

    #map {
      display: block;
      height: 100%;
      width: auto;
    }

    #shelfPhoto {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .aisle-rect {
      position: absolute;
      border: 3px solid #a8ff57;
      background: rgba(168, 255, 87, 0.2);
      box-shadow: 0 0 20px rgba(168, 255, 87, 0.5);
      border-radius: 4px;
      pointer-events: none;
      display: none;
      z-index: 10;
    }

    .aisle-rect.active {
      display: block;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        opacity: 0.6;
        box-shadow: 0 0 10px #a8ff57;
      }

      50% {
        opacity: 1;
        box-shadow: 0 0 30px #a8ff57;
      }

      100% {
        opacity: 0.6;
        box-shadow: 0 0 10px #a8ff57;
      }
    }

    .shelf-highlight {
      position: absolute;
      border: 3px solid #a8ff57;
      box-shadow: 0 0 25px #a8ff57;
      border-radius: 8px;
      pointer-events: none;
    }
  </style>

          let s = 10000;
          if (n === q) s = -1000; else if (b === q) s = -900; else if (c === q) s = -950;
          else if (n.startsWith(q)) s = -100; else if (c.startsWith(q)) s = -120;
          else if (n.includes(q)) s = 10 + n.indexOf(q); else if (c.includes(q)) s = 5 + c.indexOf(q);
          else if (b.includes(q)) s = 20;
          else { const l = lev(q, n); if (n && l <= Math.max(2, Math.floor(n.length * .25))) s = 50 + l }
          if (s < 10000) res.push({ it, s });
        }
        res.sort((a, b) => a.s - b.s); renderList(res.map(r => r.it), 0);
      }

      searchForm.addEventListener('submit', e => { e.preventDefault(); switchTab($('tab-add')); doSearch() });
      let dt = null; searchInput.addEventListener('input', () => { switchTab($('tab-add')); clearTimeout(dt); dt = setTimeout(doSearch, 150) });

      function d2b(d) { const p = d.split(','), mime = p[0].match(/:(.*?);/)[1], bin = atob(p[1]), u8 = new Uint8Array(bin.length); for (let i = 0; i < bin.length; i++)u8[i] = bin.charCodeAt(i); return new Blob([u8], { type: mime }) }

      async function uploadImg(barcode, dataURL) { if (!dataURL) return null; const blob = d2b(dataURL), fn = `${barcode}/${Date.now()}.jpg`; const { error } = await db.storage.from(BUCKET).upload(fn, blob, { cacheControl: '3600', upsert: true }); if (error) throw error; return db.storage.from(BUCKET).getPublicUrl(fn).data.publicUrl }

      async function saveItem(barcode, item) { const { error } = await db.from('items').upsert({ barcode, name: item.name, category: item.category, shelf: item.shelf, section: item.section, image_url: item.image_url || null }, { onConflict: 'barcode' }); if (error) throw error }

      async function loadDB() { const { data, error } = await db.from('items').select('*').order('created_at', { ascending: false }); if (error) throw error; bDB = {}; cats = new Set(); for (const r of data) { bDB[r.barcode] = { name: r.name || '', category: r.category || '', shelf: r.shelf || '', section: r.section || '', photo: r.image_url || '' }; if (r.category) cats.add(r.category) } updateDL() }

      function captureFrame() { try { const c = document.createElement('canvas'); c.width = video.videoWidth || 640; c.height = video.videoHeight || 480; c.getContext('2d').drawImage(video, 0, 0, c.width, c.height); return c.toDataURL('image/png') } catch (e) { return null } }

      photoInput.addEventListener('change', e => { const f = e.target.files?.[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { photoDataI.value = ev.target.result; photoPrev.src = ev.target.result; photoPrev.style.display = 'block' }; r.readAsDataURL(f) });

      function startScanner() {
        lastC = null; cnt = 0; cool = false;
        Quagga.init({ inputStream: { name: 'Live', type: 'LiveStream', target: video }, decoder: { readers: ['ean_reader', 'upc_reader', 'code_128_reader'] }, locate: true }, err => { if (err) { console.error(err); return } Quagga.start() });
        Quagga.onDetected(res => {
          if (!res?.codeResult || cool) return;
          const code = res.codeResult.code;
          if (lastC === code) cnt++; else { lastC = code; cnt = 1 }
          if (cnt >= CT) {
            cool = true; lastC = null; cnt = 0;
            const item = bDB[code];
            if (item) { showCard(code, item); switchTab($('tab-map')) }
            else {
              nameD.textContent = 'Not in database'; barD.innerHTML = `Barcode <b>${esc(code)}</b>`; shelfD.style.display = 'none'; catD.textContent = '—'; catD.className = 'chip';
              barI.value = code;
              const frame = captureFrame(); if (frame) { photoDataI.value = frame; photoPrev.src = frame; photoPrev.style.display = 'block' } else { photoDataI.value = ''; photoPrev.style.display = 'none' }
              saveBtn.querySelector('span').textContent = 'Save Item';
              video.style.display = 'none'; scanOv.classList.remove('on'); addForm.style.display = 'flex'; itemCard.classList.remove('hidden'); stopCam();
            }
            setTimeout(() => { cool = false }, 700);
          }
        });
      }

      function stopCam() { cool = false; lastC = null; cnt = 0; if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null } if (video.srcObject) { try { video.srcObject.getTracks().forEach(t => t.stop()) } catch (e) { } video.srcObject = null } if (window.Quagga) { try { Quagga.stop() } catch (e) { } } }

      async function startCam() { cool = false; lastC = null; cnt = 0; try { const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); stream = s; video.srcObject = s; video.play().catch(() => { }); torchOn = false; torchBtn.classList.remove('on'); startScanner() } catch (err) { alert('Camera error: ' + err.message) } }

      async function toggleTorch() { if (!stream) return; const t = stream.getVideoTracks()[0]; if (!t) return; try { await t.applyConstraints({ advanced: [{ torch: !torchOn }] }); torchOn = !torchOn; torchBtn.classList.toggle('on', torchOn) } catch (e) { alert('Torch not supported.') } }
      torchBtn.addEventListener('click', toggleTorch);

      async function resizeDURL(d, mw = 1024, q = .75) { return new Promise((res, rej) => { const img = new Image(); img.onload = () => { const sc = Math.min(1, mw / img.width), w = img.width * sc, h = img.height * sc, c = document.createElement('canvas'); c.width = w; c.height = h; c.getContext('2d').drawImage(img, 0, 0, w, h); try { res(c.toDataURL('image/jpeg', q)) } catch (e) { rej(e) } }; img.onerror = () => rej(new Error('fail')); img.crossOrigin = 'anonymous'; img.src = d }) }

      saveBtn.addEventListener('click', async () => {
        try {
          const name = nameI.value.trim(), cat = catI.value.trim(), shelf = shelfI.value.trim(), sec = secI.value.trim(), barcode = barI.value.trim();
          if (!name || !cat || !shelf || !sec || !barcode) { alert('Please fill in all fields.'); return }
          let photoUrl = null;
          const raw = photoDataI.value || null;
          if (raw) { let d; try { d = await resizeDURL(raw) } catch (e) { d = raw } photoUrl = await uploadImg(barcode, d) }
          else if (bDB[barcode]?.photo) photoUrl = bDB[barcode].photo;
          await saveItem(barcode, { name, category: cat, shelf, section: sec, image_url: photoUrl });
          cats.add(cat); updateDL(); await loadDB();
          showCard(barcode, bDB[barcode] || { name, shelf, section: sec, category: cat });
          addForm.style.display = 'none'; switchTab($('tab-map'));
        } catch (err) { alert('Save failed: ' + (err.message || err)) }
      });

      // Photo modal
      const photoModal = $('photoModal'), modalPhoto = $('modalPhoto');
      photoDisp.addEventListener('click', () => { if (photoDisp.src) { modalPhoto.src = photoDisp.src; photoModal.style.display = 'flex' } });
      photoModal.addEventListener('click', () => { photoModal.style.display = 'none'; modalPhoto.src = '' });

      // Map pan/zoom
      let sc = 1, mn = 0.5, mx = 6, px = 0, py = 0, pan = false, psx = 0, psy = 0, lpx = 0, lpy = 0, ltd = null;
      function at() {
        if (!mapImg.offsetWidth) return;
        const cw = mapCon.clientWidth, ch = mapCon.clientHeight, iw = mapImg.offsetWidth * sc, ih = mapImg.offsetHeight * sc;
        const b = 100;
        px = cl(px, b - iw, cw - b); py = cl(py, b - ih, ch - b);
        mapWrap.style.transform = `translate(${px}px,${py}px) scale(${sc})`;
      }
      function atNoTrans() {
        mapWrap.classList.add('no-transition');
        at();
        setTimeout(() => mapWrap.classList.remove('no-transition'), 50);
      }
      function cl(v, a, b) { return Math.max(a, Math.min(b, v)) }
      mapCon.addEventListener('wheel', e => { e.preventDefault(); const r = mapImg.getBoundingClientRect(), zf = Math.exp(-e.deltaY * .0015), ns = cl(sc * zf, mn, mx), sr = ns / sc; px -= (e.clientX - r.left) * (sr - 1); py -= (e.clientY - r.top) * (sr - 1); sc = ns; atNoTrans() }, { passive: false });
      mapCon.addEventListener('pointerdown', e => { if (e.pointerType === 'touch') return; pan = true; psx = e.clientX; psy = e.clientY; lpx = px; lpy = py; mapCon.setPointerCapture(e.pointerId) });
      mapCon.addEventListener('pointermove', e => { if (!pan) return; px = lpx + (e.clientX - psx); py = lpy + (e.clientY - psy); atNoTrans() });
      mapCon.addEventListener('pointerup', e => { pan = false; try { mapCon.releasePointerCapture(e.pointerId) } catch (_) { } });
      mapCon.addEventListener('pointercancel', e => { pan = false; try { mapCon.releasePointerCapture(e.pointerId) } catch (_) { } });
      mapCon.addEventListener('touchstart', e => { if (e.touches.length === 1) { ltd = null; pan = true; psx = e.touches[0].clientX; psy = e.touches[0].clientY; lpx = px; lpy = py } else if (e.touches.length === 2) { pan = false; ltd = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY) } }, { passive: false });
      mapCon.addEventListener('touchmove', e => { if (e.touches.length === 1 && pan) { e.preventDefault(); px = lpx + (e.touches[0].clientX - psx); py = lpy + (e.touches[0].clientY - psy); atNoTrans() } else if (e.touches.length === 2) { e.preventDefault(); const cd = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY); if (ltd) { const ns = cl(sc * (cd / ltd), mn, mx), r = mapImg.getBoundingClientRect(), cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left, cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top, sr = ns / sc; px -= cx * (sr - 1); py -= cy * (sr - 1); sc = ns; atNoTrans() } ltd = cd } }, { passive: false });
      mapCon.addEventListener('touchend', e => { if (!e.touches.length) { pan = false; ltd = null } else if (e.touches.length === 1) { pan = true; psx = e.touches[0].clientX; psy = e.touches[0].clientY; lpx = px; lpy = py; ltd = null } }, { passive: false });

      mapCon.addEventListener('click', e => {
        if (aisleH.classList.contains('active')) {
          mapCard.classList.toggle('flipped');
        }
      });

      // Init
      mapCon.style.display = 'flex';
      const MS = 'height:100%;width:auto;display:block;';
      mapImg.setAttribute('style', MS);
      mapImg.addEventListener('load', () => {
        mapImg.setAttribute('style', MS);
        px = (mapCon.clientWidth - mapImg.offsetWidth) / 2;
        py = (mapCon.clientHeight - mapImg.offsetHeight) / 2;
        atNoTrans();
      });
      window.addEventListener('load', async () => {
        try {
          await loadDB();
          initGPT(); // Initialize ItemGPT after DOM is ready
        } catch (e) { console.warn(e) }
      });
    </script>
